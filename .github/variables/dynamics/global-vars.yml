# =============================================================================
# GLOBAL PIPELINE VARIABLES — GHA-CICD-Core
# =============================================================================
# These variables apply to ALL projects that consume GHA-CICD-Core reusable
# workflows.
#
# GOVERNANCE RULES:
#   • protected_keys  : keys that project-level project-vars.yml CANNOT override.
#                       The setup merge step exits 1 with a clear error if a
#                       project-vars.yml attempts to set one.
#   • variables       : default values; project-vars.yml can override any key
#                       that is NOT in protected_keys.
#
# HOW VARIABLES REACH THE PIPELINE:
#   The setup job in build-and-deploy.yml runs a single Python step that:
#     1. Reads this file (.ci/.github/variables/dynamics/global-vars.yml)
#     2. Reads the project's .github/config/project-vars.yml
#     3. Merges them (project adds/overrides, protected_keys enforced)
#     4. Emits all values as step outputs consumed by subsequent steps and stages
# =============================================================================

# ── Keys that project-level project-vars.yml CANNOT override ─────────────────
protected_keys:
  - PP_CHECKER_GEO            # Solution Checker geography — org-wide consistency
  - PP_CHECKER_ERROR_LEVEL    # Minimum severity that fails the build — security gate
  - JFROG_URL                 # Org-wide Artifactory base URL — set once at Core layer
  - JFROG_REPO_SOLUTIONS      # Artifactory repo for solution ZIPs — org-wide
  - JFROG_REPO_SARIF          # Artifactory repo for checker SARIF reports — org-wide
  - BASE_SOLUTIONS                        # Comma-separated base solution names — org-wide
  - SOLUTION_IMPORT_MAX_WAIT_MINUTES      # Import timeout cap — org-wide safety limit
  - SOLUTION_CHECKER_TIMEOUT_MINUTES      # Checker timeout cap — org-wide safety limit

# ── Global default values ─────────────────────────────────────────────────────
variables:
  # Power Platform — Solution Checker (enforced, org-wide)
  PP_CHECKER_GEO:         "UnitedStates"
  PP_CHECKER_ERROR_LEVEL: "HighIssue"

  # JFrog Artifactory — org-wide values (protected: projects cannot override)
  # Set JFROG_URL to your organisation's Artifactory base URL.
  # Solution ZIPs and SARIF reports are stored in separate repositories.
  JFROG_URL:             ""
  JFROG_REPO_SOLUTIONS:  "powerplatform-solutions"
  JFROG_REPO_SARIF:      "powerplatform-checker-reports"

  # Base solutions for version-compare (protected: hardcoded at Core layer)
  # Comma-separated unique names of prerequisite solutions that must be present
  # before deploying project solutions. Leave empty to skip base-solution checks.
  BASE_SOLUTIONS: ""

  # Pipeline timeouts (protected: org-wide caps, projects cannot override)
  SOLUTION_IMPORT_MAX_WAIT_MINUTES: "60"
  SOLUTION_CHECKER_TIMEOUT_MINUTES: "10"
