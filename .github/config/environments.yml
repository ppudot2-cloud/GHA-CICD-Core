# =============================================================================
# ENVIRONMENT REGISTRY — Single source of truth for all deployment targets
# =============================================================================
#
# PURPOSE
# ─────────────────────────────────────────────────────────────────────────────
# Defines every valid environment name and its default deployment properties.
# Consumed by:
#   • rollback.yml         — choice input list
#   • _stage-deploy-chain.yml — per-env config construction
#   • health-check.yml     — environment labels
#   • Documentation / runbooks
#
# Fields per environment:
#   url_variable          GitHub Repo/Environment variable holding the PP URL
#   solution_type         Unmanaged (sandbox) | Managed (production-grade)
#   enable_blocking_check Block deploy when active flows / ownership locks exist
#   enable_version_compare Skip import when installed version >= artifact version
#   import_config_data    Run pac data import after solution import
#   activate_flows        Activate all cloud flows after import
#   previous_env          Environment immediately before this one in the chain
#                         (used for version-compare baseline). null = first in chain
#   is_production         true = Prod-grade (Managed, all checks on, ServiceNow)
#
# ADDING A NEW ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────
# 1. Add an entry here with the correct properties
# 2. Add a GitHub Environment in Settings → Environments (same name, exact case)
# 3. Add the PP_<NAME>_URL variable in the Dynamics repo variables
# 4. Add a federated credential on the Azure App Registration for:
#      Subject: repo:<org>/<dynamics-repo>:environment:<Name>
# 5. If environment requires approval, add Required Reviewers in GitHub Settings
# =============================================================================

environments:

  Dev:
    url_variable:          PP_DEV_URL
    solution_type:         Unmanaged
    enable_blocking_check: false
    enable_version_compare: false
    import_config_data:    false
    activate_flows:        true
    previous_env:          null
    is_production:         false

  Intg:
    url_variable:          PP_INTG_URL
    solution_type:         Managed
    enable_blocking_check: true
    enable_version_compare: true
    import_config_data:    false
    activate_flows:        true
    previous_env:          Dev
    is_production:         false

  UAT:
    url_variable:          PP_UAT_URL
    solution_type:         Managed
    enable_blocking_check: true
    enable_version_compare: true
    import_config_data:    false
    activate_flows:        true
    previous_env:          Intg
    is_production:         false

  FRS:
    url_variable:          PP_FRS_URL
    solution_type:         Managed
    enable_blocking_check: true
    enable_version_compare: true
    import_config_data:    false
    activate_flows:        true
    previous_env:          UAT
    is_production:         false

  Perf:
    url_variable:          PP_PERF_URL
    solution_type:         Managed
    enable_blocking_check: true
    enable_version_compare: true
    import_config_data:    false
    activate_flows:        true
    previous_env:          FRS
    is_production:         false

  Prod:
    url_variable:          PP_PROD_URL
    solution_type:         Managed
    enable_blocking_check: true
    enable_version_compare: true
    import_config_data:    true
    activate_flows:        true
    previous_env:          UAT
    is_production:         true
