# =============================================================================
# COMPOSITE ACTION: Install PAC CLI
# =============================================================================
# Installs the Power Platform CLI (PAC) and adds it to PATH.
#
# WHY A SEPARATE ACTION?
#   Every job that interacts with Power Platform (build, deploy, export) needs
#   PAC CLI. Wrapping the install in a named composite action ensures all jobs
#   use the same install mechanism and version, and keeps individual job step
#   lists clean (one step vs. repeating the raw uses: + with: everywhere).
#
# INSTALLATION STRATEGY
#   The microsoft.powerapps.cli.tool NuGet package ships without the required
#   DotnetToolSettings.xml manifest file, causing:
#     "Settings file 'DotnetToolSettings.xml' was not found in the package"
#   This happens regardless of .NET SDK version.
#
#   Workaround: download the .nupkg from NuGet, inject the missing
#   DotnetToolSettings.xml, then install from the patched local feed.
#
# USED BY:
#   - _job-build.yml    — needed for solution pack and Solution Checker
#   - _job-deploy.yml   — needed for solution import and publish
#   - export-solution   — needed for pac solution export
# =============================================================================
name: 'Install PAC CLI'
description: 'Install Power Platform CLI (PAC) and add to PATH'

runs:
  using: composite
  steps:
    # Cache key: OS + content of .github/pac-version (bump that file to force a fresh install)
    # Cache path: ~/.dotnet/tools where `dotnet tool install -g` places global tools
    - name: Restore PAC CLI from cache
      id: cache-pac
      uses: actions/cache@v4
      with:
        path: ~/.dotnet/tools
        key: pac-cli-${{ runner.os }}-${{ hashFiles('.ci/.github/pac-version', '.github/pac-version') }}
        restore-keys: |
          pac-cli-${{ runner.os }}-

    # PAC CLI NuGet package (microsoft.powerapps.cli.tool) ships without
    # DotnetToolSettings.xml, which dotnet tool install requires.
    #
    # Fix:
    #   1. Remove any existing broken installation (causes "failed to update" error)
    #   2. Download the latest .nupkg from NuGet
    #   3. Inject the missing DotnetToolSettings.xml into the zip archive
    #   4. Install from the patched local feed using .NET 8 (via global.json)
    - name: Install PAC CLI (patch missing DotnetToolSettings.xml)
      if: steps.cache-pac.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail

        # ── 1. Remove any broken existing installation ────────────────────────
        # Uninstall via dotnet AND scrub the tool store directory to prevent
        # "failed to update" errors caused by leftover store metadata.
        dotnet tool uninstall --global microsoft.powerapps.cli.tool 2>/dev/null || true
        rm -rf "$HOME/.dotnet/tools/.store/microsoft.powerapps.cli.tool" 2>/dev/null || true

        # ── 2. Resolve latest version from NuGet ─────────────────────────────
        PAC_VER=$(curl -fsSL \
          "https://api.nuget.org/v3-flatcontainer/microsoft.powerapps.cli.tool/index.json" \
          | python3 -c "
        import sys, json, re
        vers = json.load(sys.stdin)['versions']
        def key(v): return [int(x) for x in re.split(r'[.\-]', v) if x.isdigit()]
        print(sorted(vers, key=key)[-1])
        ")
        echo "PAC CLI version: $PAC_VER"

        WORK=$(mktemp -d)
        trap 'rm -rf "$WORK"' EXIT

        # ── 3. Download .nupkg ────────────────────────────────────────────────
        curl -fsSL \
          "https://api.nuget.org/v3-flatcontainer/microsoft.powerapps.cli.tool/${PAC_VER}/microsoft.powerapps.cli.tool.${PAC_VER}.nupkg" \
          -o "$WORK/pac.nupkg"

        # ── 4. Inject DotnetToolSettings.xml (the missing file) ───────────────
        # The file tells dotnet tool install: command name = pac, entry DLL = pac.dll
        cat > "$WORK/DotnetToolSettings.xml" << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<DotNetCliTool Version="1">
  <Commands>
    <Command Name="pac" EntryPoint="pac.dll" Runner="dotnet" />
  </Commands>
</DotNetCliTool>
XML
        # Add into the zip at the root level (nupkg = zip)
        (cd "$WORK" && zip pac.nupkg DotnetToolSettings.xml)

        # ── 5. Install from patched local feed using .NET 8 ──────────────────
        mkdir -p "$WORK/local-feed"
        cp "$WORK/pac.nupkg" "$WORK/local-feed/microsoft.powerapps.cli.tool.${PAC_VER}.nupkg"

        # global.json forces .NET 8 SDK without needing setup-dotnet
        # (setup-dotnet causes permission errors on /usr/share/dotnet/host)
        printf '{"sdk":{"version":"8.0.0","rollForward":"latestMinor"}}' \
          > "$WORK/global.json"

        # nuget.config clears ALL sources so dotnet uses ONLY our patched local
        # feed — without this, --add-source still allows dotnet to resolve from
        # NuGet.org and fetch the unpatched package, ignoring our local copy.
        cat > "$WORK/nuget.config" << EOF
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <packageSources>
    <clear />
    <add key="local-patched" value="${WORK}/local-feed" />
  </packageSources>
</configuration>
EOF

        (cd "$WORK" && dotnet tool install --global \
          --configfile "$WORK/nuget.config" \
          microsoft.powerapps.cli.tool \
          --version "$PAC_VER")

        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # On cache hit the install step above is skipped and tools are NOT on PATH yet —
    # re-add the dotnet global tools directory so `pac` is callable.
    - name: Add PAC to PATH (cache hit)
      if: steps.cache-pac.outputs.cache-hit == 'true'
      shell: bash
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
