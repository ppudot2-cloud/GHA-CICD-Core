# =============================================================================
# COMPOSITE ACTION: Install PAC CLI
# =============================================================================
# Installs the Power Platform CLI (PAC) and adds it to PATH.
#
# WHY A SEPARATE ACTION?
#   Every job that interacts with Power Platform (build, deploy, export) needs
#   PAC CLI. Wrapping the install in a named composite action ensures all jobs
#   use the same install mechanism and version, and keeps individual job step
#   lists clean (one step vs. repeating the raw uses: + with: everywhere).
#
# INSTALLATION STRATEGY
#   microsoft.powerapps.cli.tool targets a specific .NET TFM (net6/net8/net10…)
#   that changes with each major PAC CLI release. Installing with the wrong SDK
#   version produces a misleading "DotnetToolSettings.xml not found" error.
#
#   Strategy:
#     1. Download the .nupkg and locate pac.dll to detect the required TFM.
#     2. If the runner lacks that .NET SDK, install it via dotnet-install.sh
#        into $HOME/.dotnet (avoids /usr/share/dotnet permission errors).
#     3. Inject DotnetToolSettings.xml ONLY if the package is missing it
#        (some older PAC CLI versions shipped without it).
#     4. Install from a local feed using the correct SDK.
#
# USED BY:
#   - _job-build.yml    — needed for solution pack and Solution Checker
#   - _job-deploy.yml   — needed for solution import and publish
#   - export-solution   — needed for pac solution export
# =============================================================================
name: 'Install PAC CLI'
description: 'Install Power Platform CLI (PAC) and add to PATH'

runs:
  using: composite
  steps:
    # Cache key: OS + content of .github/pac-version (bump that file to force a fresh install)
    # Cache path: ~/.dotnet/tools where `dotnet tool install -g` places global tools
    - name: Restore PAC CLI from cache
      id: cache-pac
      uses: actions/cache@v4
      with:
        path: ~/.dotnet/tools
        key: pac-cli-${{ runner.os }}-${{ hashFiles('.ci/.github/pac-version', '.github/pac-version') }}
        restore-keys: |
          pac-cli-${{ runner.os }}-

    # PAC CLI NuGet package (microsoft.powerapps.cli.tool) ships without
    # DotnetToolSettings.xml, which dotnet tool install requires.
    #
    # Fix:
    #   1. Remove any existing broken installation (causes "failed to update" error)
    #   2. Download the latest .nupkg from NuGet
    #   3. Inject the missing DotnetToolSettings.xml into the zip archive
    #   4. Install from the patched local feed using .NET 8 (via global.json)
    - name: Install PAC CLI (patch missing DotnetToolSettings.xml)
      if: steps.cache-pac.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail

        # ── 1. Remove any broken existing installation ────────────────────────
        dotnet tool uninstall --global microsoft.powerapps.cli.tool 2>/dev/null || true
        rm -rf "$HOME/.dotnet/tools/.store/microsoft.powerapps.cli.tool" 2>/dev/null || true

        # ── 2. Resolve latest PAC CLI version ─────────────────────────────────
        PAC_VER=$(curl -fsSL \
          "https://api.nuget.org/v3-flatcontainer/microsoft.powerapps.cli.tool/index.json" \
          | python3 -c "
        import sys, json, re
        vers = json.load(sys.stdin)['versions']
        def key(v): return [int(x) for x in re.split(r'[.\-]', v) if x.isdigit()]
        print(sorted(vers, key=key)[-1])
        ")
        echo "PAC CLI version: $PAC_VER"

        WORK=$(mktemp -d)
        trap 'rm -rf "$WORK"' EXIT

        # ── 3. Download .nupkg ────────────────────────────────────────────────
        curl -fsSL \
          "https://api.nuget.org/v3-flatcontainer/microsoft.powerapps.cli.tool/${PAC_VER}/microsoft.powerapps.cli.tool.${PAC_VER}.nupkg" \
          -o "$WORK/pac.nupkg"

        # ── 4. Detect required .NET TFM from pac.dll location ─────────────────
        mkdir -p "$WORK/pkg"
        (cd "$WORK/pkg" && unzip -q "$WORK/pac.nupkg")

        PAC_DLL=$(find "$WORK/pkg/tools" -name "pac.dll" 2>/dev/null | head -1)
        [ -n "$PAC_DLL" ] || { echo "::error::pac.dll not found in nupkg" >&2; exit 1; }
        PAC_TOOLS_DIR=$(dirname "$PAC_DLL")

        # tools/net10.0/any  →  TFM=net10.0  →  DOTNET_MAJOR=10
        TFM=$(basename "$(dirname "$PAC_TOOLS_DIR")")
        DOTNET_MAJOR=$(echo "$TFM" | sed -E 's/net([0-9]+)\..*/\1/')
        echo "Package targets $TFM — requires .NET $DOTNET_MAJOR"

        # ── 5. Ensure required .NET SDK is available ──────────────────────────
        # Use dotnet-install.sh into $HOME/.dotnet to avoid permission errors
        # on /usr/share/dotnet that setup-dotnet@v4 can trigger on some runners.
        if ! dotnet --list-sdks 2>/dev/null | grep -q "^${DOTNET_MAJOR}\."; then
          echo "Installing .NET ${DOTNET_MAJOR} SDK..."
          curl -fsSL https://dot.net/v1/dotnet-install.sh \
            | bash -s -- --channel "${DOTNET_MAJOR}.0" --install-dir "$HOME/.dotnet"
        fi
        export DOTNET_ROOT="$HOME/.dotnet"
        export PATH="$HOME/.dotnet:$PATH"

        # ── 6. Inject DotnetToolSettings.xml only if the package lacks it ─────
        # Older PAC CLI versions shipped without this file. Recent versions
        # (net10.0+) already include it. Only patch when actually missing.
        if [ ! -f "$PAC_TOOLS_DIR/DotnetToolSettings.xml" ]; then
          echo "DotnetToolSettings.xml missing — injecting"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<DotNetCliTool Version="1">' \
            '  <Commands>' \
            '    <Command Name="pac" EntryPoint="pac.dll" Runner="dotnet" />' \
            '  </Commands>' \
            '</DotNetCliTool>' \
            > "$PAC_TOOLS_DIR/DotnetToolSettings.xml"
          REL_FILE="${PAC_TOOLS_DIR#${WORK}/pkg/}/DotnetToolSettings.xml"
          (cd "$WORK/pkg" && zip "$WORK/pac.nupkg" "$REL_FILE")
        else
          echo "DotnetToolSettings.xml already present — no patching needed"
        fi

        # ── 7. Install from local feed ────────────────────────────────────────
        # Copy nupkg (patched or original) to a local-only NuGet feed.
        # <clear /> ensures dotnet uses ONLY this feed, not NuGet.org.
        mkdir -p "$WORK/local-feed"
        cp "$WORK/pac.nupkg" "$WORK/local-feed/microsoft.powerapps.cli.tool.${PAC_VER}.nupkg"

        printf '%s\n' \
          '<?xml version="1.0" encoding="utf-8"?>' \
          '<configuration>' \
          '  <packageSources>' \
          '    <clear />' \
          "    <add key=\"local-patched\" value=\"${WORK}/local-feed\" />" \
          '  </packageSources>' \
          '</configuration>' \
          > "$WORK/nuget.config"

        dotnet tool install --global \
          --configfile "$WORK/nuget.config" \
          microsoft.powerapps.cli.tool \
          --version "$PAC_VER"

        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # On cache hit the install step above is skipped and tools are NOT on PATH yet —
    # re-add the dotnet global tools directory so `pac` is callable.
    - name: Add PAC to PATH (cache hit)
      if: steps.cache-pac.outputs.cache-hit == 'true'
      shell: bash
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
