# =============================================================================
# COMPOSITE ACTION: CI Bootstrap
# =============================================================================
# Shared first-step group used by both _job-build and _job-deploy.
# Performs: repo checkout, GHA-CICD-Core CI checkout, Azure OIDC login,
#           AKV secret fetch, and global/project variable merge.
#
# NOTE: Composite actions cannot access ${{ secrets.* }} directly.
#       Callers must expose GHA_CORE_PAT via env: GHA_CORE_PAT on the step.
# =============================================================================
name: 'Reveille'
description: 'Reveille — wake the runner: checkout repos, Azure OIDC login, fetch AKV secrets, merge variables, register module sources'

inputs:
  mock_deploy:
    description: 'Skip Azure login and AKV fetch in dry-run mode'
    required: false
    default: 'false'
  jfrog_enabled:
    description: 'Fetch jfrog-api-key from AKV and register JFrog as the default PowerShell module repository'
    required: false
    default: 'false'
  mulesoft_enabled:
    description: >
      Fetch Mulesoft credentials from AKV (mulesoft-client-id, mulesoft-client-secret).
      Set true for environments where solutions use Mulesoft connectors.
      Exports MULESOFT_CLIENT_ID and MULESOFT_CLIENT_SECRET into the job environment.
    required: false
    default: 'false'
  servicenow_enabled:
    description: >
      Fetch ServiceNow credentials from AKV and export into the job environment.
      Required when ServiceNow change management is active for the deployment.
      Fetches the following AKV secrets:
        snow-base-uri          → SERVICENOWMURI
        snow-oauth-client-id   → SNOW_OAUTH_CLIENT_ID
        snow-oauth-client-secret → SNOW_OAUTH_CLIENT_SECRET
      Non-prod: optional — controlled by vars.SERVICENOW_ENABLED or workflow_dispatch.
      Prod: always 'true' — mandatory, hardcoded in the caller, no user override.
    required: false
    default: 'false'
  azure_client_id:
    description: 'Azure service principal client ID — read from project-vars.yml variables.AZURE_CLIENT_ID'
    required: false
    default: ''
  azure_tenant_id:
    description: 'Azure tenant ID — read from project-vars.yml variables.AZURE_TENANT_ID'
    required: false
    default: ''
  azure_subscription_id:
    description: 'Azure subscription ID — read from project-vars.yml variables.AZURE_SUBSCRIPTION_ID'
    required: false
    default: ''
  azure_key_vault_name:
    description: >
      Azure Key Vault name — read from project-vars.yml (per-environment key_vault_name field,
      falling back to variables.AZURE_KEY_VAULT_NAME). Set a different key_vault_name per
      environment to use separate KVs for non-prod and prod.
      One service principal per KV boundary is the recommended pattern.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout calling repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1   # shallow clone — pipeline steps never need full git history

    - name: Checkout GHA-CICD-Core CI scripts
      uses: actions/checkout@v4
      with:
        repository: ppudot2-cloud/GHA-CICD-Core
        ref:        v1.0.0   # pinned — prevents unreviewed Core changes from breaking jobs mid-run
        path:       .ci
        fetch-depth: 1
        token: ${{ env.GHA_CORE_PAT || github.token }}

    # ── OIDC pre-login diagnostic ─────────────────────────────────────────────
    # Validates that all three Azure identity inputs are non-empty and prints
    # the OIDC subject claim that Azure AD will receive. This is the single most
    # useful piece of information for diagnosing AADSTS700016 / AADSTS70021 errors:
    #
    #   AADSTS700016 — "Application not found in directory"
    #     → AZURE_CLIENT_ID or AZURE_TENANT_ID is wrong.
    #       Check: Settings → Environments → <env> → Variables — an environment-level
    #       override may be shadowing the repo-level variable with a stale/wrong value.
    #
    #   AADSTS70021 — "No matching federated identity record"
    #     → The subject claim printed below has no matching federated credential on
    #       the App Registration. Add a federated credential in Azure AD:
    #         Issuer  : https://token.actions.githubusercontent.com
    #         Subject : <value printed below>
    #
    # Required federated credential subjects per pipeline / job context:
    #   Pipeline 1 — build-and-deploy.yml (feature/* push)
    #     Jobs in _stage-deploy-chain.yml with environment: Dev/Intg/UAT/FRS/Perf
    #       Subject: repo:<org>/<repo>:environment:Dev  (and Intg, UAT, FRS, Perf)
    #   Pipeline 2 — deploy-prod.yml (push to main / workflow_dispatch)
    #     deploy-uat job with environment: UAT
    #       Subject: repo:<org>/<repo>:environment:UAT
    #     deploy-prod job with environment: Prod
    #       Subject: repo:<org>/<repo>:environment:Prod
    #   Other workflows without environment: (lint-and-validate, deploy-env, etc.)
    #       Subject: repo:<org>/<repo>:ref:refs/heads/<branch>
    # ─────────────────────────────────────────────────────────────────────────
    - name: Validate Azure auth inputs and print OIDC subject
      if: ${{ inputs.mock_deploy != 'true' }}
      shell: bash
      run: |
        CLIENT_ID="${{ inputs.azure_client_id }}"
        TENANT_ID="${{ inputs.azure_tenant_id }}"
        SUB_ID="${{ inputs.azure_subscription_id }}"

        echo "── Azure OIDC Auth Diagnostic ─────────────────────────────────"

        # ── Validate inputs are non-empty ─────────────────────────────────────
        FAILED=0
        if [ -z "$CLIENT_ID" ]; then
          echo "::error::AZURE_CLIENT_ID is empty."
          echo "::error::Check: Settings → Secrets and variables → Variables → AZURE_CLIENT_ID (repo level)"
          echo "::error::Also check: Settings → Environments → $(cat /dev/null) → Variables for an environment-level override with a wrong/empty value."
          FAILED=1
        fi
        if [ -z "$TENANT_ID" ]; then
          echo "::error::AZURE_TENANT_ID is empty."
          echo "::error::Check: Settings → Secrets and variables → Variables → AZURE_TENANT_ID (repo level)"
          FAILED=1
        fi
        if [ -z "$SUB_ID" ]; then
          echo "::error::AZURE_SUBSCRIPTION_ID is empty."
          echo "::error::Check: Settings → Secrets and variables → Variables → AZURE_SUBSCRIPTION_ID (repo level)"
          FAILED=1
        fi
        if [ "$FAILED" = "1" ]; then exit 1; fi

        # ── Print resolved values (client-id partially masked) ────────────────
        CLIENT_MASKED="${CLIENT_ID:0:8}...${CLIENT_ID: -4}"
        echo "  tenant_id        : ${TENANT_ID}"
        echo "  subscription_id  : ${SUB_ID}"
        echo "  client_id        : ${CLIENT_MASKED} (first 8 + last 4 chars shown)"

        # ── Decode OIDC token and print subject claim ─────────────────────────
        # The subject claim must exactly match a federated credential on the App Registration.
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value // empty' 2>/dev/null || true)
          if [ -n "$OIDC_TOKEN" ]; then
            # Decode JWT payload (second segment, base64url → base64)
            PAYLOAD=$(echo "$OIDC_TOKEN" | cut -d'.' -f2 | tr '_-' '/+' | \
                      awk '{ while(length($0)%4!=0) $0=$0"="; print }' | base64 -d 2>/dev/null || true)
            SUBJECT=$(echo "$PAYLOAD" | jq -r '.sub // "could not decode"' 2>/dev/null || echo "could not decode")
            ISSUER=$(echo "$PAYLOAD"  | jq -r '.iss // "could not decode"' 2>/dev/null || echo "could not decode")
            echo "  oidc_issuer      : ${ISSUER}"
            echo "  oidc_subject     : ${SUBJECT}"
            echo ""
            echo "  ► The App Registration (client_id above) must have a federated credential with:"
            echo "    Issuer  : ${ISSUER}"
            echo "    Subject : ${SUBJECT}"
            echo "  ► If you see AADSTS700016: the client_id/tenant_id above is wrong or the App"
            echo "    Registration was deleted/moved. Check the tenant name in the Azure error vs"
            echo "    the AZURE_TENANT_ID above — they must point to the same directory."
            echo "  ► If you see AADSTS70021: add a federated credential with the subject above."
          else
            echo "  oidc_subject     : (could not fetch OIDC token — check id-token: write permission)"
          fi
        else
          echo "  oidc_subject     : (OIDC env vars not available — is id-token: write granted?)"
        fi
        echo "──────────────────────────────────────────────────────────────"

    - name: Azure Login (OIDC)
      if: ${{ inputs.mock_deploy != 'true' }}
      uses: azure/login@v2
      with:
        client-id:       ${{ inputs.azure_client_id }}
        tenant-id:       ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Fetch secrets from Azure Key Vault
      if: ${{ inputs.mock_deploy != 'true' }}
      shell: pwsh
      run: |
        $kvName          = '${{ inputs.azure_key_vault_name }}'
        $jfrogEnabled    = '${{ inputs.jfrog_enabled }}'      -eq 'true'
        $mulesoftEnabled = '${{ inputs.mulesoft_enabled }}'   -eq 'true'
        $snowEnabled     = '${{ inputs.servicenow_enabled }}' -eq 'true'

        # ── Core Power Platform credentials (always fetched) ──────────────────
        $secrets = [ordered]@{
          'pp-app-id'        = 'PP_APP_ID'
          'pp-client-secret' = 'PP_CLIENT_SECRET'
          'pp-tenant-id'     = 'PP_TENANT_ID'
        }

        # ── Optional: JFrog API key ───────────────────────────────────────────
        # Stored in KV as 'jfrog-api-key'. Required when jfrog_url is set so
        # the build/deploy jobs can authenticate to Artifactory for artifact
        # uploads, downloads, and PS module installs.
        if ($jfrogEnabled) { $secrets['jfrog-api-key'] = 'JFROG_TOKEN' }

        # ── Optional: Mulesoft connector credentials ──────────────────────────
        # Solutions using Mulesoft connection references need the Mulesoft
        # client ID and secret to be injected via deployment settings tokens.
        # Store these in the per-environment KV as:
        #   mulesoft-client-id     → MULESOFT_CLIENT_ID
        #   mulesoft-client-secret → MULESOFT_CLIENT_SECRET
        # Reference them in deployment-settings JSON as #{MULESOFT_CLIENT_ID}#
        # and #{MULESOFT_CLIENT_SECRET}#.
        if ($mulesoftEnabled) {
          $secrets['mulesoft-client-id']     = 'MULESOFT_CLIENT_ID'
          $secrets['mulesoft-client-secret'] = 'MULESOFT_CLIENT_SECRET'
        }

        # ── Optional: ServiceNow change management credentials ────────────
        # Required when ServiceNow integration is active for the environment.
        # Non-prod: optional (servicenow_enabled=true via vars or dispatch).
        # Prod: always fetched — servicenow_enabled is hardcoded to 'true' by the caller.
        # Store in AKV as:
        #   snow-base-uri          → SERVICENOWMURI         (instance URL)
        #   snow-oauth-client-id   → SNOW_OAUTH_CLIENT_ID
        #   snow-oauth-client-secret → SNOW_OAUTH_CLIENT_SECRET
        if ($snowEnabled) {
          $secrets['snow-base-uri']            = 'SERVICENOWMURI'
          $secrets['snow-oauth-client-id']     = 'SNOW_OAUTH_CLIENT_ID'
          $secrets['snow-oauth-client-secret'] = 'SNOW_OAUTH_CLIENT_SECRET'
        }

        # ── Batch fetch: all secrets in parallel (PowerShell 7 ForEach-Object -Parallel)
        # Replaces sequential foreach loop — reduces N serial API calls to ~1-2s wall-clock
        # regardless of how many secrets are requested.
        $kvNameForParallel = $kvName   # capture for -Parallel closure
        $results = $secrets.GetEnumerator() | ForEach-Object -Parallel {
          $kv     = $using:kvNameForParallel
          $kn     = $_.Key
          $envKey = $_.Value
          $val    = az keyvault secret show --vault-name $kv --name $kn --query value -o tsv 2>&1
          [PSCustomObject]@{
            SecretName = $kn
            EnvKey     = $envKey
            Value      = $val
            Success    = ($LASTEXITCODE -eq 0)
          }
        } -ThrottleLimit 8

        # Validate and export results
        $failed = @()
        foreach ($r in $results) {
          if (-not $r.Success) {
            $failed += "  ✘ AKV:'$($r.SecretName)': $($r.Value)"
            continue
          }
          Write-Host "::add-mask::$($r.Value)"
          "$($r.EnvKey)=$($r.Value)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "  ✔ Fetched AKV:'$($r.SecretName)' → ENV:'$($r.EnvKey)'"
        }
        if ($failed.Count -gt 0) {
          Write-Error "Failed to fetch $($failed.Count) secret(s) from AKV '$kvName':`n$($failed -join "`n")"
          exit 1
        }
        Write-Host "✅ All $($secrets.Count) secret(s) fetched in parallel from Azure Key Vault: $kvName"

    # ── Simulation mode: inject mock credentials ──────────────────────────────
    # When mock_deploy=true the Azure login and AKV fetch steps above are
    # skipped entirely, so PP_APP_ID / PP_CLIENT_SECRET / PP_TENANT_ID are
    # never populated. Inject safe mock values so downstream scripts that
    # reference these env vars don't fail with "variable not set" errors.
    # No real Power Platform connection is ever attempted in mock mode.
    - name: Inject mock credentials (simulation mode)
      if: ${{ inputs.mock_deploy == 'true' }}
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════════════════════════════════╗"
        Write-Host "║  SIMULATION MODE  (mock_deploy = true)                               ║"
        Write-Host "║  Azure login and AKV fetch are skipped.                              ║"
        Write-Host "║  Mock credentials injected — no real PP / Azure calls will be made.  ║"
        Write-Host "╚══════════════════════════════════════════════════════════════════════╝"
        Write-Host ""
        @(
          "PP_APP_ID=mock-pp-app-id-00000000-0000-0000-0000-000000000000",
          "PP_CLIENT_SECRET=mock-pp-client-secret",
          "PP_TENANT_ID=mock-pp-tenant-id-00000000-0000-0000-0000-000000000000",
          "JFROG_TOKEN=mock-jfrog-token"
        ) | ForEach-Object {
          $_ | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "  ✔ (mock) $($_.Split('=')[0])"
        }

    - name: Merge global and project variables
      shell: pwsh
      run: |
        pwsh .ci/.github/scripts/dynamics/Merge-Variables.ps1 `
          -GlobalVarsPath  ".ci/.github/variables/dynamics/global-vars.yml" `
          -ProjectVarsPath ".github/config/project-vars.yml"

    # ── Register JFrog as the default PowerShell module repository ────────────
    # Agents in air-gapped / restricted-network environments cannot reach the
    # public PSGallery. This step unregisters PSGallery and registers JFrog
    # Artifactory (NuGet v2 feed) so that Install-Module calls in subsequent
    # steps resolve from JFrog. JFrog's remote-repository proxy caches modules
    # the first time they are requested, so no internet access from the agent
    # is needed after the first run.
    #
    # Requires: JFROG_TOKEN and JFROG_URL + JFROG_REPO in env (set above and
    # by Merge-Variables.ps1). Skipped in mock mode and when jfrog_enabled=false.
    - name: Register JFrog as default PS module repository
      if: ${{ inputs.mock_deploy != 'true' && inputs.jfrog_enabled == 'true' }}
      shell: pwsh
      run: |
        $jfrogUrl  = $env:JFROG_URL
        $jfrogRepo = $env:JFROG_REPO
        $jfrogToken = $env:JFROG_TOKEN

        if (-not $jfrogUrl -or -not $jfrogRepo -or -not $jfrogToken) {
          Write-Warning "JFROG_URL, JFROG_REPO, or JFROG_TOKEN not set — skipping PS repository registration"
          exit 0
        }

        # NuGet v2 feed URL for PowerShell modules in Artifactory
        $feedUrl = "$jfrogUrl/api/nuget/v2/$jfrogRepo"

        # Unregister PSGallery — agents have no internet access
        if (Get-PSRepository -Name "PSGallery" -ErrorAction SilentlyContinue) {
          Unregister-PSRepository -Name "PSGallery"
          Write-Host "  ✓ PSGallery unregistered (no internet access on agent)"
        }

        # Register JFrog NuGet feed as trusted PS repository
        $cred = New-Object PSCredential(
          "artifactory",
          (ConvertTo-SecureString $jfrogToken -AsPlainText -Force)
        )
        if (Get-PSRepository -Name "JFrog" -ErrorAction SilentlyContinue) {
          Unregister-PSRepository -Name "JFrog"
        }
        Register-PSRepository `
          -Name             "JFrog" `
          -SourceLocation   $feedUrl `
          -PublishLocation  $feedUrl `
          -InstallationPolicy Trusted `
          -Credential       $cred
        Write-Host "  ✓ JFrog registered as trusted PS repository: $feedUrl"
        Write-Host "✅ PowerShell module source: JFrog ($feedUrl)"
