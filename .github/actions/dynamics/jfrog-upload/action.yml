# =============================================================================
# COMPOSITE ACTION: JFrog Upload
# =============================================================================
# Uploads the built solution artifacts to JFrog Artifactory for long-term
# storage and traceability. Called by _job-build AFTER Solution Checker passes.
#
# WHY JFROG (not just GitHub artifact storage)?
#   GitHub artifacts have a configurable retention window (default 7 days here).
#   JFrog provides indefinite retention with property-based search, enabling:
#     - Audit queries: "which build deployed to Prod on date X?"
#     - Version history across all solutions and environments
#     - prodDeployed tagging (set by post-deploy after Prod succeeds)
#
# WHAT IS UPLOADED?
#   Per-solution folder in JFrog: <repo>/<github-repo>/<solution>/<run#>-<attempt>/
#     - <solution>_unmanaged.zip  — unmanaged ZIP (source record)
#     - <solution>_managed.zip    — managed ZIP (deployed to non-Dev environments)
#     - solution-checker/*.sarif  — Solution Checker SARIF report
#
# ARTIFACT NAMING:
#   artifact_name = solution-<Name>-run<run_number>[-a<attempt>]
#   The run attempt suffix is omitted on attempt 1 for readability.
#   Re-runs produce a distinct artifact name so they never overwrite prior attempts.
#
# PROD TAGGING (separate step, not here):
#   After a successful Prod deploy, Invoke-JFrogAction.ps1 -Action tag sets
#   prodDeployed=true and deployedDate=<date> properties on the artifact.
#   This tagging happens in post-deploy/action.yml, not in this upload action.
#
# MOCK MODE:
#   Invoke-JFrogAction.ps1 is called with -MockDeploy:$true; no network calls made.
# =============================================================================
name: 'JFrog Upload'
description: 'Uploads solution artifacts to JFrog Artifactory after a successful build'

inputs:
  solution_name:
    description: 'Name of the solution'
    required: true
  artifact_name:
    description: 'Artifact identifier (e.g. MySolution_1.0.20240101.1)'
    required: true
  unmanaged_zip:
    description: 'Path to the unmanaged solution zip'
    required: true
  managed_zip:
    description: 'Path to the managed solution zip'
    required: true
  checker_artifact_name:
    description: 'Artifact name for the Solution Checker SARIF report'
    required: true
  jfrog_url:
    description: 'JFrog Artifactory base URL'
    required: true
  jfrog_repo_solutions:
    description: 'JFrog repository for solution ZIPs (managed + unmanaged)'
    required: true
  jfrog_repo_sarif:
    description: 'JFrog repository for Solution Checker SARIF reports'
    required: true
  run_number:
    description: 'GitHub run number'
    required: true
  run_attempt:
    description: 'GitHub run attempt number'
    required: true
  mock_deploy:
    description: 'If true, skip actual JFrog upload'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Upload solution ZIPs to JFrog
      shell: pwsh
      run: |
        $scriptPath = ".ci/.github/scripts/dynamics/Invoke-JFrogAction.ps1"
        $localPath = Split-Path "${{ inputs.managed_zip }}" -Parent
        & $scriptPath `
          -Action       "upload" `
          -SolutionName "${{ inputs.solution_name }}" `
          -RepoName     "$env:GITHUB_REPOSITORY" `
          -LocalPath    $localPath `
          -FileFilter   "*.zip" `
          -JFrogUrl     "${{ inputs.jfrog_url }}" `
          -JFrogRepo    "${{ inputs.jfrog_repo_solutions }}" `
          -RunNumber    "${{ inputs.run_number }}" `
          -RunAttempt   "${{ inputs.run_attempt }}" `
          -MockDeploy:$${{ inputs.mock_deploy == 'true' }} `
          -JFrogToken   "${{ env.JFROG_TOKEN }}"

    - name: Upload SARIF report to JFrog
      shell: pwsh
      run: |
        $scriptPath = ".ci/.github/scripts/dynamics/Invoke-JFrogAction.ps1"
        # Locate the SARIF file via the sidecar path file written by solution-checker
        $sarifPath = $null
        $pathFile = Get-ChildItem -Path "." -Recurse -Filter "sarif.path" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($pathFile) {
          $candidate = (Get-Content $pathFile.FullName -Raw).Trim()
          if ($candidate -and $candidate -ne 'not-found' -and (Test-Path $candidate)) {
            $sarifPath = Split-Path $candidate -Parent
          }
        }
        if (-not $sarifPath) {
          Write-Host "::notice::No SARIF report found — skipping SARIF upload to JFrog."
          exit 0
        }
        & $scriptPath `
          -Action       "upload" `
          -SolutionName "${{ inputs.solution_name }}" `
          -RepoName     "$env:GITHUB_REPOSITORY" `
          -LocalPath    $sarifPath `
          -FileFilter   "*.sarif" `
          -JFrogUrl     "${{ inputs.jfrog_url }}" `
          -JFrogRepo    "${{ inputs.jfrog_repo_sarif }}" `
          -RunNumber    "${{ inputs.run_number }}" `
          -RunAttempt   "${{ inputs.run_attempt }}" `
          -MockDeploy:$${{ inputs.mock_deploy == 'true' }} `
          -JFrogToken   "${{ env.JFROG_TOKEN }}"
