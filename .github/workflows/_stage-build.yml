# ─────────────────────────────────────────────────────────────────────────────
# _stage-build.yml  —  Reusable BUILD STAGE
#
# Fans out _job-build across every solution in the provided matrix using
# job-level `uses:` + `strategy.matrix` (the only valid GitHub pattern for
# calling reusable workflows in parallel across a matrix).
#
# First job: validate
#   Runs before the build matrix. Does ALL pre-build validation in one gate:
#   1. Lint: validates solutions.json, deployment-settings paths, project-vars.yml
#            protected keys, and unresolved #{TOKEN}# placeholders.
#   2. Runtime config: checks all 7 PP environment URLs, Azure OIDC repo variables,
#            GHA_CORE_PAT, and JFrog. Fails non-mock runs if required values are missing.
#   Merged from the former _stage-export.yml lint job + the former standalone validate job.
#
# Export mode (combined-pipeline):
#   Pass source_environment_url = PP_SDBX_URL to enable _job-build's optional
#   export-solution step, which exports from sandbox before packing.
#
# Build-only mode (release-pipeline, default):
#   Leave source_environment_url empty; _job-build packs from src/solutions/.
#
# NOTE: GitHub Actions constraint — when a job uses `uses:` (reusable workflow
#       call) it cannot also have `steps:`. The matrix values are passed
#       directly as `with:` inputs to the called workflow.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      matrix:
        description: >
          JSON array of solution objects, e.g.:
          [{"name":"CoreSolution","source_folder":"src/solutions/CoreSolution",
            "data_schema_file":"","deployment_settings_prefix":"deployment-settings"}]
        required: true
        type: string
      mock_deploy:
        description: 'Simulate the full pipeline without Dataverse/JFrog changes'
        required: false
        type: boolean
        default: false
      jfrog_url:
        description: 'JFrog Artifactory base URL'
        required: false
        type: string
        default: ''
      jfrog_repo:
        description: 'JFrog repository name'
        required: false
        type: string
        default: 'power-platform'
      use_exported_source:
        description: >
          When true, _job-build downloads the exported-source-<name> artifact uploaded
          by _stage-export instead of packing from the committed source tree.
          Set by combined-pipeline based on whether stage-export ran and succeeded.
        required: false
        type: boolean
        default: false
      source_environment_url:
        description: 'Sandbox URL passed to _job-build for config-data export (not for solution export)'
        required: false
        type: string
        default: ''
      # ── Validate job inputs (pipeline context forwarded from caller) ──────────
      enable_backup:
        description: 'Whether pre-import backups are enabled'
        required: false
        type: boolean
        default: false
      base_solutions:
        description: 'Comma-separated base solution names to verify'
        required: false
        type: string
        default: ''
      solution_count:
        description: 'Number of solutions in this run'
        required: false
        type: string
        default: ''
      solution_list:
        description: 'Comma-separated solution names in this run'
        required: false
        type: string
        default: ''
      pp_sdbx_url:
        description: 'Power Platform sandbox URL'
        required: false
        type: string
        default: ''
      pp_dev_url:
        description: 'Power Platform Dev environment URL'
        required: false
        type: string
        default: ''
      pp_intg_url:
        description: 'Power Platform Intg environment URL'
        required: false
        type: string
        default: ''
      pp_uat_url:
        description: 'Power Platform UAT environment URL'
        required: false
        type: string
        default: ''
      pp_frs_url:
        description: 'Power Platform FRS environment URL'
        required: false
        type: string
        default: ''
      pp_perf_url:
        description: 'Power Platform Perf environment URL'
        required: false
        type: string
        default: ''
      pp_prod_url:
        description: 'Power Platform Prod environment URL'
        required: false
        type: string
        default: ''
      gha_core_pat_set:
        description: 'Whether GHA_CORE_PAT secret is configured (pre-evaluated in caller)'
        required: false
        type: boolean
        default: false

      azure_client_id:
        description: 'Azure service principal client ID — passed from the caller repo (vars.AZURE_CLIENT_ID)'
        required: false
        type: string
        default: ''
      azure_tenant_id:
        description: 'Azure tenant ID — passed from the caller repo (vars.AZURE_TENANT_ID)'
        required: false
        type: string
        default: ''
      azure_subscription_id:
        description: 'Azure subscription ID — passed from the caller repo (vars.AZURE_SUBSCRIPTION_ID)'
        required: false
        type: string
        default: ''
      azure_key_vault_name:
        description: 'Azure Key Vault name — passed from the caller repo (vars.AZURE_KEY_VAULT_NAME)'
        required: false
        type: string
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # validate  —  runs FIRST, before the build matrix
  #
  # Prints all pipeline toggles, environment URLs, and service connection status
  # so the team can confirm what is on/off before any build work begins.
  # Fails non-mock runs if required secrets or environment URLs are missing.
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: "✅ Lint + Validate Pipeline Config"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Lint: file-system checks (solutions.json, deployment-settings, project-vars.yml) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Validate solutions.json, deployment-settings, and project-vars.yml
        id: lint
        shell: python
        run: |
          import json, yaml, os, sys, re
          from xml.etree import ElementTree as ET

          SOLUTIONS_FILE = 'solutions.json'
          PROJ_VARS_FILE = '.github/config/project-vars.yml'
          PROTECTED_KEYS = {
            'PP_CHECKER_GEO', 'PP_CHECKER_ERROR_LEVEL',
            'DEFAULT_SOLUTION_TYPE', 'ENABLE_BACKUP', 'ENABLE_ROLLBACK'
          }

          errors   = []
          warnings = []

          if not os.path.isfile(SOLUTIONS_FILE):
              print(f'::error::{SOLUTIONS_FILE} not found — this file is required')
              sys.exit(1)

          try:
              with open(SOLUTIONS_FILE) as f:
                  raw = json.load(f)
          except json.JSONDecodeError as e:
              print(f'::error::{SOLUTIONS_FILE}: invalid JSON — {e}')
              sys.exit(1)

          solutions = raw.get('solutions', [])
          if not solutions:
              errors.append(f'{SOLUTIONS_FILE}: "solutions" array is empty or missing')

          solution_names = {s.get('name') for s in solutions if s.get('name')}
          deploy_orders  = []

          for sol in solutions:
              name = sol.get('name', '<unnamed>')

              for field in ('name', 'folder', 'deployOrder', 'deploymentSettings'):
                  if field not in sol:
                      errors.append(f'[{name}] Missing required field: "{field}"')

              folder = sol.get('folder', '')
              if folder and not os.path.isdir(folder):
                  errors.append(f'[{name}] folder "{folder}" does not exist')

              deploy_order = sol.get('deployOrder')
              if deploy_order is not None:
                  if not isinstance(deploy_order, int) or deploy_order < 1:
                      errors.append(f'[{name}] deployOrder must be a positive integer, got: {deploy_order!r}')
                  elif deploy_order in deploy_orders:
                      errors.append(f'[{name}] deployOrder {deploy_order} is a duplicate')
                  else:
                      deploy_orders.append(deploy_order)

              for dep in sol.get('dependsOn', []):
                  if dep not in solution_names:
                      warnings.append(f'[{name}] dependsOn "{dep}" is not declared in solutions.json')

              schema_file = sol.get('dataSchemaFile', '')
              if schema_file:
                  if not os.path.isfile(schema_file):
                      errors.append(f'[{name}] dataSchemaFile "{schema_file}" does not exist')
                  else:
                      try:
                          ET.parse(schema_file)
                      except ET.ParseError as e:
                          errors.append(f'[{name}] dataSchemaFile "{schema_file}" is not valid XML: {e}')

              settings = sol.get('deploymentSettings', {})
              if not isinstance(settings, dict):
                  errors.append(f'[{name}] deploymentSettings must be an object')
                  continue

              for env_name, path in settings.items():
                  if not path:
                      warnings.append(f'[{name}/{env_name}] deploymentSettings path is empty')
                      continue

                  expected_prefix = f'src/solutions/{name}/'
                  if not path.startswith(expected_prefix):
                      warnings.append(
                          f'[{name}/{env_name}] deploymentSettings path "{path}" does not follow '
                          f'the convention src/solutions/{name}/deployment-settings-{env_name}.json'
                      )

                  if not os.path.isfile(path):
                      errors.append(f'[{name}/{env_name}] deploymentSettings file "{path}" does not exist')
                      continue

                  try:
                      with open(path) as f:
                          ds = json.load(f)
                  except json.JSONDecodeError as e:
                      errors.append(f'[{name}/{env_name}] "{path}": invalid JSON — {e}')
                      continue

                  for key in ('EnvironmentVariables', 'ConnectionReferences'):
                      if key not in ds:
                          warnings.append(f'[{name}/{env_name}] "{path}": missing "{key}" array (will default to empty)')
                      elif not isinstance(ds[key], list):
                          errors.append(f'[{name}/{env_name}] "{path}": "{key}" must be an array')

                  ds_str = open(path).read()
                  for token in re.findall(r'#\{([^}]+)\}#', ds_str):
                      warnings.append(
                          f'[{name}/{env_name}] "{path}": token "#{{{token}}}#" — '
                          f'ensure "{token}" is in Azure Key Vault or as a GitHub Variable'
                      )

          if os.path.isfile(PROJ_VARS_FILE):
              try:
                  with open(PROJ_VARS_FILE) as f:
                      proj = yaml.safe_load(f)
              except yaml.YAMLError as e:
                  errors.append(f'{PROJ_VARS_FILE}: invalid YAML — {e}')
                  proj = None

              if proj and isinstance(proj.get('variables'), dict):
                  for key in PROTECTED_KEYS:
                      if key in proj['variables']:
                          errors.append(
                              f'{PROJ_VARS_FILE}: contains protected key "{key}" — '
                              f'will cause pipeline failure at runtime'
                          )

                  CRED_PATTERNS = re.compile(r'(password|secret|token|key|apikey|pwd)', re.IGNORECASE)
                  for k, v in proj['variables'].items():
                      if CRED_PATTERNS.search(k) and v and str(v).strip():
                          warnings.append(
                              f'{PROJ_VARS_FILE}: variable "{k}" looks like a credential — '
                              f'secrets must live in Azure Key Vault, not in this file'
                          )
          else:
              warnings.append(f'{PROJ_VARS_FILE} not found — using global defaults from GHA-CICD-Core')

          for w in warnings:
              print(f'::warning::{w}')

          if errors:
              print(f'::error::Found {len(errors)} error(s) — fix all errors before merging:')
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          else:
              print(f'✅ Linted {len(solutions)} solution(s) — {len(warnings)} warning(s), 0 errors')

      - name: Write config validation summary
        if: always()
        shell: python
        run: |
          import json, os

          solutions_count = 0
          try:
              with open('solutions.json') as f:
                  data = json.load(f)
              solutions_count = len(data.get('solutions', []))
          except Exception:
              pass

          outcome = '${{ steps.lint.outcome }}'
          icon    = '✅' if outcome == 'success' else '❌'

          summary = f"""## {icon} Config Lint

          | Check | Value |
          |---|---|
          | solutions.json | {solutions_count} solution(s) |
          | Result | **{outcome.upper()}** |
          | Triggered by | ${{ github.actor }} |
          | Branch | ${{ github.head_ref || github.ref_name }} |

          """
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)

      # ── Runtime validate: env URLs, Azure OIDC vars, secrets ──────────────────
      - name: Validate runtime config
        shell: pwsh
        run: |
          $isMock = '${{ inputs.mock_deploy }}' -eq 'true'

          function Flag($v) { if ($v -eq 'true') { '🟢 ON' } else { '🔴 OFF' } }

          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════"
          Write-Host "   PIPELINE CONFIGURATION  —  Run #${{ github.run_number }}"
          Write-Host "═══════════════════════════════════════════════════════════"
          Write-Host ""
          Write-Host "── Toggles ─────────────────────────────────────────────"
          Write-Host ("  {0,-24} {1}" -f "mock_deploy",         (Flag '${{ inputs.mock_deploy }}'))
          Write-Host ("  {0,-24} {1}" -f "enable_backup",       (Flag '${{ inputs.enable_backup }}'))
          Write-Host ("  {0,-24} {1}" -f "checker_error_level", 'HighIssue')
          Write-Host ("  {0,-24} {1}" -f "base_solutions",      '${{ inputs.base_solutions || '(none)' }}')
          Write-Host ""
          Write-Host "── Solutions ───────────────────────────────────────────"
          Write-Host ("  {0,-24} {1}" -f "Count",  '${{ inputs.solution_count }}')
          Write-Host ("  {0,-24} {1}" -f "List",   '${{ inputs.solution_list }}')
          Write-Host ""
          Write-Host "── Environment URLs ────────────────────────────────────"
          $urls = [ordered]@{
            'Sandbox (export)' = '${{ inputs.pp_sdbx_url }}'
            'Dev'              = '${{ inputs.pp_dev_url }}'
            'Intg'             = '${{ inputs.pp_intg_url }}'
            'UAT'              = '${{ inputs.pp_uat_url }}'
            'FRS'              = '${{ inputs.pp_frs_url }}'
            'Perf'             = '${{ inputs.pp_perf_url }}'
            'Prod'             = '${{ inputs.pp_prod_url }}'
          }
          $missingUrls = [System.Collections.Generic.List[string]]::new()
          foreach ($e in $urls.GetEnumerator()) {
            if ($e.Value) {
              Write-Host ("  {0,-20} ✅  {1}" -f $e.Key, $e.Value)
            } else {
              Write-Host ("  {0,-20} ❌  NOT SET" -f $e.Key)
              $missingUrls.Add($e.Key)
            }
          }
          Write-Host ""
          Write-Host "── Azure OIDC Identity ─────────────────────────────────"
          $azureClientId = '${{ inputs.azure_client_id }}'
          $azureTenantId = '${{ inputs.azure_tenant_id }}'
          $azureSubId    = '${{ inputs.azure_subscription_id }}'
          $azureKvName   = '${{ inputs.azure_key_vault_name }}'
          $ghaCorePatSet = '${{ inputs.gha_core_pat_set }}' -eq 'true'
          if ($isMock) {
            Write-Host "  Azure OIDC           ⚠️  skipped (mock_deploy=true)"
          } else {
            $a1 = if ($azureClientId) { '✅  Set' } else { '❌  NOT SET' }
            $a2 = if ($azureTenantId) { '✅  Set' } else { '❌  NOT SET' }
            $a3 = if ($azureSubId)    { '✅  Set' } else { '❌  NOT SET' }
            $a4 = if ($azureKvName)   { '✅  Set' } else { '❌  NOT SET' }
            Write-Host ("  {0,-24} {1}" -f "AZURE_CLIENT_ID",       $a1)
            Write-Host ("  {0,-24} {1}" -f "AZURE_TENANT_ID",       $a2)
            Write-Host ("  {0,-24} {1}" -f "AZURE_SUBSCRIPTION_ID", $a3)
            Write-Host ("  {0,-24} {1}" -f "AZURE_KEY_VAULT_NAME",  $a4)
          }
          $s4 = if ($ghaCorePatSet) { '✅  Set' } else { '❌  NOT SET' }
          Write-Host ("  {0,-24} {1}" -f "GHA_CORE_PAT", $s4)
          Write-Host ""
          Write-Host "── JFrog ───────────────────────────────────────────────"
          $jfrogUrl = '${{ inputs.jfrog_url }}'
          if ($jfrogUrl) {
            Write-Host "  JFROG_URL            ✅  $jfrogUrl"
            Write-Host ("  JFROG_REPO           {0}" -f '${{ inputs.jfrog_repo || 'power-platform' }}')
          } else {
            Write-Host "  JFrog                ⚠️  Not configured (jfrog_url not set) — archival disabled"
          }
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════"

          # ── Step summary (rendered as a table in GitHub Actions UI) ─────────
          $md  = "## Pipeline Configuration — Run #${{ github.run_number }}`n`n"
          $md += "### Toggles`n`n| Toggle | Value |`n|---|---|`n"
          $md += "| mock_deploy | $(Flag '${{ inputs.mock_deploy }}') |`n"
          $md += "| enable_backup | $(Flag '${{ inputs.enable_backup }}') |`n"
          $md += "| checker_error_level | ``HighIssue`` |`n"
          $md += "| base_solutions | ``${{ inputs.base_solutions || '(none)' }}`` |`n`n"
          $md += "### Solutions (${{ inputs.solution_count }})`n`n"
          $md += "${{ inputs.solution_list }}`n`n"
          $md += "### Environment URLs`n`n| Environment | Status |`n|---|---|`n"
          foreach ($e in $urls.GetEnumerator()) {
            $urlStatus = if ($e.Value) { "✅ ``$($e.Value)``" } else { "❌ **NOT SET**" }
            $md += "| $($e.Key) | $urlStatus |`n"
          }
          $md += "`n### Azure OIDC Identity`n`n| Variable | Status |`n|---|---|`n"
          if ($isMock) {
            $md += "| Azure OIDC | ⚠️ Skipped (mock_deploy=true) |`n"
          } else {
            $md += "| AZURE_CLIENT_ID | $(if ($azureClientId) { '✅ Set' } else { '❌ **NOT SET**' }) |`n"
            $md += "| AZURE_TENANT_ID | $(if ($azureTenantId) { '✅ Set' } else { '❌ **NOT SET**' }) |`n"
            $md += "| AZURE_SUBSCRIPTION_ID | $(if ($azureSubId) { '✅ Set' } else { '❌ **NOT SET**' }) |`n"
            $md += "| AZURE_KEY_VAULT_NAME | $(if ($azureKvName) { '✅ Set' } else { '❌ **NOT SET**' }) |`n"
          }
          $md += "| GHA_CORE_PAT | $(if ($ghaCorePatSet) { '✅ Set' } else { '❌ **NOT SET**' }) |`n"
          if ($jfrogUrl) {
            $md += "`n### JFrog`n`n✅ Configured — ``$jfrogUrl```n"
          } else {
            $md += "`n### JFrog`n`n⚠️ Not configured — archival disabled`n"
          }
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          # ── Fail non-mock if OIDC identity or deployment URLs are missing ────────
          # PP credentials (PP_APP_ID etc.) are fetched from Azure Key Vault by
          # reveille — they are NOT GitHub secrets and are not checked here.
          if (-not $isMock) {
            $errors = [System.Collections.Generic.List[string]]::new()
            if (-not $azureClientId) { $errors.Add('AZURE_CLIENT_ID repo variable is not set (Settings → Variables)') }
            if (-not $azureTenantId) { $errors.Add('AZURE_TENANT_ID repo variable is not set') }
            if (-not $azureSubId)    { $errors.Add('AZURE_SUBSCRIPTION_ID repo variable is not set') }
            if (-not $azureKvName)   { $errors.Add('AZURE_KEY_VAULT_NAME repo variable is not set') }
            # Sandbox and Prod URLs are optional for Pipeline 1 — warn, don't block
            $optionalEnvs = @('Sandbox (export)', 'Prod')
            foreach ($u in ($missingUrls | Where-Object { $_ -in $optionalEnvs })) {
              $hint = if ($u -eq 'Sandbox (export)') { 'use skip_export=true or set PP_SDBX_URL' } `
                      else { 'only needed for deploy-prod.yml (Pipeline 2)' }
              Write-Host "  ⚠️ $u URL not set — $hint"
            }
            $missingRequired = $missingUrls | Where-Object { $_ -notin $optionalEnvs }
            if ($missingRequired.Count -gt 0) {
              $errors.Add("Deployment URLs not configured: $($missingRequired -join ', ')")
            }
            if ($errors.Count -gt 0) {
              Write-Host ""
              foreach ($err in $errors) { Write-Host "  ❌ $err" }
              Write-Error "Pipeline validation failed — fix the above before deploying"
              exit 1
            }
          }
          Write-Host "  ✅ Validation passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # build  —  runs after validate passes
  #
  # Fans out _job-build across every solution in the provided matrix.
  # checker_error_level is hardcoded to 'HighIssue' — not configurable by projects.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.solution.name }}
    needs: [validate]
    if: needs.validate.result == 'success'
    strategy:
      matrix: ${{ fromJson(inputs.matrix) }}
      fail-fast: false
    # Job-level `uses:` + `strategy.matrix` — GitHub Actions valid pattern.
    # A job with `uses:` cannot have `steps:` or `runs-on:`.
    uses: ppudot2-cloud/GHA-CICD-Core/.github/workflows/_job-build.yml@main
    with:
      solution_name:          ${{ matrix.solution.name }}
      solution_source_folder: ${{ matrix.solution.source_folder || format('src/solutions/{0}', matrix.solution.name) }}
      use_exported_source:    ${{ inputs.use_exported_source }}
      checker_error_level:    'HighIssue'
      data_schema_file:       ${{ matrix.solution.data_schema_file || '' }}
      source_environment_url: ${{ inputs.source_environment_url }}
      mock_deploy:            ${{ inputs.mock_deploy }}
      jfrog_url:              ${{ inputs.jfrog_url }}
      jfrog_repo:             ${{ inputs.jfrog_repo }}
      azure_client_id:        ${{ inputs.azure_client_id }}
      azure_tenant_id:        ${{ inputs.azure_tenant_id }}
      azure_subscription_id:  ${{ inputs.azure_subscription_id }}
      azure_key_vault_name:   ${{ inputs.azure_key_vault_name }}
    secrets: inherit
