# =============================================================================
# WORKFLOW: Credential & Secret Health Check
# =============================================================================
#
# PURPOSE
# ─────────────────────────────────────────────────────────────────────────────
# Scans multiple Azure Key Vaults and App Registrations for secrets/certificates
# approaching expiry. Each check context uses its own OIDC identity (service
# connection) so a single workflow can audit credentials across different
# subscriptions, tenants, and security boundaries without sharing a single
# over-privileged identity.
#
# USAGE — standalone (workflow_dispatch)
# ─────────────────────────────────────────────────────────────────────────────
# Trigger manually from GHA-CICD-Core's Actions tab. Paste a JSON array into the
# checks_config input. Example:
#
#   [
#     {
#       "name": "Production KeyVault",
#       "azure_client_id":       "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
#       "azure_tenant_id":       "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy",
#       "azure_subscription_id": "zzzzzzzz-zzzz-zzzz-zzzz-zzzzzzzzzzzz",
#       "key_vault_name":        "my-prod-keyvault",
#       "app_registration_ids":  ["aaa-bbb-ccc", "ddd-eee-fff"]
#     },
#     {
#       "name": "Dev KeyVault",
#       "azure_client_id":       "11111111-1111-1111-1111-111111111111",
#       "azure_tenant_id":       "22222222-2222-2222-2222-222222222222",
#       "azure_subscription_id": "33333333-3333-3333-3333-333333333333",
#       "key_vault_name":        "my-dev-keyvault",
#       "app_registration_ids":  []
#     }
#   ]
#
# USAGE — reusable (workflow_call from GHA-Dynamics or any caller)
# ─────────────────────────────────────────────────────────────────────────────
# In your caller workflow:
#
#   jobs:
#     health-check:
#       uses: ppudot2-cloud/GHA-CICD-Core/.github/workflows/health-check.yml@main
#       with:
#         checks_config: ${{ toJson(vars.HEALTH_CHECK_CONFIG) }}
#         warning_days: 30
#       secrets: inherit
#
# The caller must grant  id-token: write  at the calling job or workflow level.
#
# AUTHENTICATION
# ─────────────────────────────────────────────────────────────────────────────
# Each check entry uses OIDC Workload Identity Federation. The azure_client_id
# in each entry is the Client ID of an App Registration that has a federated
# credential configured for:
#   Issuer:  https://token.actions.githubusercontent.com
#   Subject: repo:<org>/<repo>:ref:refs/heads/main   (or environment/branch as needed)
#
# Required Azure RBAC roles per check context:
#   • Key Vault Secrets User  (or Key Vault Reader) on the Key Vault
#   • Cloud Application Administrator  (or Directory Readers)  on the tenant
#     — needed only if app_registration_ids is non-empty
#
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
# • GitHub Step Summary: sorted table of all expiring items (closest first)
# • GitHub Issue:        created/updated if any items expire within warning_days
#                        closed automatically when nothing is expiring
# • Job exit code:       non-zero if any HARD expiry (≤ 0 days) is detected
#
# =============================================================================

name: Credential Health Check

on:
  # ── Scheduled: monthly credential expiry sweep ──────────────────────────────
  # Runs on the 1st of every month at 08:00 UTC.
  # checks_config and warning_days are read from repository variables so the
  # schedule trigger needs no inputs — configure them once in:
  #   Settings → Secrets and variables → Variables
  #     HEALTH_CHECK_CONFIG   — JSON array (same schema as workflow_dispatch input)
  #     HEALTH_CHECK_WARN_DAYS — integer, default 30
  schedule:
    - cron: '0 8 1 * *'   # monthly — 1st of every month at 08:00 UTC

  # ── Standalone: run manually from the Actions tab ───────────────────────────
  # Useful for on-demand audits or testing a new checks_config value before
  # saving it as a repository variable.
  workflow_dispatch:
    inputs:
      checks_config:
        description: >
          JSON array of check contexts. Each entry: { "name", "azure_client_id",
          "azure_tenant_id", "azure_subscription_id", "key_vault_name",
          "app_registration_ids": [...] }
        required: false
        type: string

      warning_days:
        description: 'Days-to-expiry threshold — items expiring within this window are reported'
        required: false
        default: '30'
        type: string

  # ── Reusable: called from GHA-Dynamics or any other caller ──────────────────
  workflow_call:
    inputs:
      checks_config:
        description: 'JSON array of check contexts (same schema as workflow_dispatch)'
        required: true
        type: string

      warning_days:
        description: 'Days-to-expiry threshold'
        required: false
        default: '30'
        type: string

    outputs:
      expiring_count:
        description: 'Number of credentials expiring within warning_days'
        value: ${{ jobs.scan.outputs.expiring_count }}

      critical_count:
        description: 'Number of credentials already expired or expiring within 7 days'
        value: ${{ jobs.scan.outputs.critical_count }}

concurrency:
  group: health-check-${{ github.ref_name }}
  cancel-in-progress: false   # never cancel — always complete a health check run

permissions:
  id-token:      write   # OIDC token exchange with Azure
  contents:      read
  issues:        write   # create/update/close the persistent expiry issue

jobs:
  scan:
    name: "🔑 Scan Credentials & Secrets"
    runs-on: ubuntu-latest

    outputs:
      expiring_count: ${{ steps.analyse.outputs.expiring_count }}
      critical_count: ${{ steps.analyse.outputs.critical_count }}

    steps:
      # ── Install Azure CLI (latest) ─────────────────────────────────────────
      - name: Install Azure CLI
        shell: bash
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az --version | head -1

      # ── Collect expiry data from every check context ───────────────────────
      # Each context uses its own OIDC identity — we exchange a fresh OIDC token
      # for each entry rather than using azure/login@v2 (which can only hold one
      # active auth at a time and would overwrite itself on each iteration).
      - name: Collect expiry data
        id: collect
        shell: python3 {0}
        env:
          # Input resolution priority:
          #   1. workflow_dispatch / workflow_call inputs (manual or caller-supplied)
          #   2. Repository variables HEALTH_CHECK_CONFIG / HEALTH_CHECK_WARN_DAYS
          #      (used automatically by the schedule trigger which has no inputs)
          # Set these variables once in:
          #   GHA-CICD-Core → Settings → Secrets and variables → Variables
          CHECKS_CONFIG:  ${{ inputs.checks_config || vars.HEALTH_CHECK_CONFIG }}
          WARNING_DAYS:   ${{ inputs.warning_days || vars.HEALTH_CHECK_WARN_DAYS || '30' }}
          # GitHub OIDC endpoint — needed to mint per-context tokens
          ACTIONS_ID_TOKEN_REQUEST_URL:   ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          import json, os, subprocess, sys, urllib.request, urllib.parse
          from datetime import datetime, timezone

          checks_raw  = os.environ['CHECKS_CONFIG']
          warning_days = int(os.environ.get('WARNING_DAYS', '30'))
          oidc_url    = os.environ.get('ACTIONS_ID_TOKEN_REQUEST_URL', '')
          oidc_token  = os.environ.get('ACTIONS_ID_TOKEN_REQUEST_TOKEN', '')

          try:
              checks = json.loads(checks_raw)
          except json.JSONDecodeError as e:
              print(f'::error::checks_config is not valid JSON: {e}')
              sys.exit(1)

          if not isinstance(checks, list) or len(checks) == 0:
              print('::error::checks_config must be a non-empty JSON array')
              sys.exit(1)

          # ── Helper: get OIDC token for a given audience ─────────────────────
          def get_oidc_token(audience='api://AzureADTokenExchange'):
              if not oidc_url or not oidc_token:
                  print('::error::OIDC environment variables are not set. '
                        'Ensure id-token: write permission is granted.')
                  sys.exit(1)
              url = f"{oidc_url}&audience={urllib.parse.quote(audience)}"
              req = urllib.request.Request(url, headers={'Authorization': f'bearer {oidc_token}'})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())['value']

          # ── Helper: run az CLI and return stdout ────────────────────────────
          def az(*args, check=True):
              result = subprocess.run(
                  ['az'] + list(args),
                  capture_output=True, text=True
              )
              if check and result.returncode != 0:
                  raise RuntimeError(result.stderr.strip())
              return result.stdout.strip()

          # ── Helper: login with a specific OIDC identity ─────────────────────
          def az_login(client_id, tenant_id, subscription_id):
              token = get_oidc_token('api://AzureADTokenExchange')
              az('login',
                 '--service-principal',
                 '--username',     client_id,
                 '--tenant',       tenant_id,
                 '--federated-token', token,
                 '--output', 'none')
              az('account', 'set', '--subscription', subscription_id)

          # ── Helper: parse ISO-8601 datetime → datetime (UTC) ────────────────
          def parse_dt(s):
              if not s:
                  return None
              # Azure returns formats like "2026-11-01T00:00:00+00:00" or "2026-11-01T00:00:00Z"
              s = s.rstrip('Z')
              for fmt in ('%Y-%m-%dT%H:%M:%S+00:00', '%Y-%m-%dT%H:%M:%S', '%Y-%m-%dT%H:%M:%S.%f'):
                  try:
                      return datetime.strptime(s[:len(fmt.replace('%f','000000'))], fmt).replace(tzinfo=timezone.utc)
                  except ValueError:
                      pass
              try:
                  return datetime.fromisoformat(s.replace('Z', '+00:00'))
              except Exception:
                  return None

          now = datetime.now(timezone.utc)
          all_findings = []   # list of dicts

          # ── Main scan loop ──────────────────────────────────────────────────
          for idx, check in enumerate(checks):
              ctx_name    = check.get('name', f'Context-{idx+1}')
              client_id   = check.get('azure_client_id', '')
              tenant_id   = check.get('azure_tenant_id', '')
              sub_id      = check.get('azure_subscription_id', '')
              kv_name     = check.get('key_vault_name', '')
              app_ids     = check.get('app_registration_ids', [])

              print(f'\n── [{ctx_name}] Authenticating (client_id={client_id[:8]}...)...')

              try:
                  az_login(client_id, tenant_id, sub_id)
              except Exception as e:
                  print(f'::error::[{ctx_name}] OIDC login failed: {e}')
                  all_findings.append({
                      'context': ctx_name, 'resource': '(login)',
                      'type': 'ERROR', 'name': str(e),
                      'expiry': None, 'days_left': None
                  })
                  continue

              # ── Key Vault secrets ─────────────────────────────────────────
              if kv_name:
                  print(f'  [{ctx_name}] Scanning Key Vault: {kv_name}')
                  try:
                      secrets_json = az('keyvault', 'secret', 'list',
                                        '--vault-name', kv_name,
                                        '--query', '[].{name:name, id:id}',
                                        '--output', 'json')
                      secrets = json.loads(secrets_json) if secrets_json else []
                  except Exception as e:
                      print(f'::warning::[{ctx_name}] Failed to list KV secrets: {e}')
                      secrets = []

                  for sec in secrets:
                      sec_name = sec.get('name', '')
                      try:
                          detail_json = az('keyvault', 'secret', 'show',
                                           '--name',       sec_name,
                                           '--vault-name', kv_name,
                                           '--query',      'attributes.{expires:expires, enabled:enabled}',
                                           '--output',     'json')
                          detail = json.loads(detail_json) if detail_json else {}
                      except Exception as e:
                          print(f'::warning::[{ctx_name}] Could not get detail for secret {sec_name}: {e}')
                          continue

                      expiry_str = detail.get('expires')
                      if not expiry_str:
                          continue   # no expiry set — skip

                      expiry_dt  = parse_dt(expiry_str)
                      if expiry_dt is None:
                          continue

                      days_left  = (expiry_dt - now).days
                      all_findings.append({
                          'context':   ctx_name,
                          'resource':  kv_name,
                          'type':      'KV Secret',
                          'name':      sec_name,
                          'expiry':    expiry_dt.strftime('%Y-%m-%d'),
                          'days_left': days_left
                      })

                  # ── Key Vault certificates ──────────────────────────────────
                  try:
                      certs_json = az('keyvault', 'certificate', 'list',
                                      '--vault-name', kv_name,
                                      '--query', '[].{name:name}',
                                      '--output', 'json')
                      certs = json.loads(certs_json) if certs_json else []
                  except Exception as e:
                      print(f'::warning::[{ctx_name}] Failed to list KV certificates: {e}')
                      certs = []

                  for cert in certs:
                      cert_name = cert.get('name', '')
                      try:
                          detail_json = az('keyvault', 'certificate', 'show',
                                           '--name',       cert_name,
                                           '--vault-name', kv_name,
                                           '--query',      'attributes.{expires:expires}',
                                           '--output',     'json')
                          detail = json.loads(detail_json) if detail_json else {}
                      except Exception as e:
                          print(f'::warning::[{ctx_name}] Could not get detail for cert {cert_name}: {e}')
                          continue

                      expiry_str = detail.get('expires')
                      if not expiry_str:
                          continue

                      expiry_dt  = parse_dt(expiry_str)
                      if expiry_dt is None:
                          continue

                      days_left  = (expiry_dt - now).days
                      all_findings.append({
                          'context':   ctx_name,
                          'resource':  kv_name,
                          'type':      'KV Certificate',
                          'name':      cert_name,
                          'expiry':    expiry_dt.strftime('%Y-%m-%d'),
                          'days_left': days_left
                      })

              # ── App Registration client secrets ───────────────────────────
              for app_id in (app_ids or []):
                  print(f'  [{ctx_name}] Scanning App Registration: {app_id}')
                  try:
                      creds_json = az('ad', 'app', 'credential', 'list',
                                      '--id',    app_id,
                                      '--query', '[].{displayName:displayName, endDateTime:endDateTime, keyId:keyId}',
                                      '--output', 'json')
                      creds = json.loads(creds_json) if creds_json else []
                  except Exception as e:
                      print(f'::warning::[{ctx_name}] Failed to list credentials for app {app_id}: {e}')
                      continue

                  # Try to get the display name of the App Registration
                  try:
                      app_display_json = az('ad', 'app', 'show',
                                            '--id',    app_id,
                                            '--query', 'displayName',
                                            '--output', 'tsv')
                      app_display = app_display_json.strip() or app_id
                  except Exception:
                      app_display = app_id

                  for cred in creds:
                      expiry_str = cred.get('endDateTime', '')
                      if not expiry_str:
                          continue

                      expiry_dt  = parse_dt(expiry_str)
                      if expiry_dt is None:
                          continue

                      days_left  = (expiry_dt - now).days
                      key_label  = cred.get('displayName') or cred.get('keyId', '')[:8]
                      all_findings.append({
                          'context':   ctx_name,
                          'resource':  app_display,
                          'type':      'App Reg Secret',
                          'name':      key_label,
                          'expiry':    expiry_dt.strftime('%Y-%m-%d'),
                          'days_left': days_left
                      })

          # ── Logout / clear credentials ──────────────────────────────────────
          az('logout', '--username', '', check=False)
          az('account', 'clear', check=False)

          # ── Persist findings for next step ──────────────────────────────────
          with open('health-findings.json', 'w') as f:
              json.dump(all_findings, f, indent=2)

          print(f'\n✅ Scan complete — {len(all_findings)} dated credential(s) found across all contexts')

      # ── Analyse findings and produce outputs ───────────────────────────────
      - name: Analyse and report
        id: analyse
        shell: python3 {0}
        env:
          WARNING_DAYS: ${{ inputs.warning_days || '30' }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          import json, os, sys
          from datetime import datetime, timezone

          warning_days = int(os.environ.get('WARNING_DAYS', '30'))

          try:
              with open('health-findings.json') as f:
                  all_findings = json.load(f)
          except FileNotFoundError:
              print('::error::health-findings.json not found — scan step may have failed')
              sys.exit(1)

          now = datetime.now(timezone.utc)

          # Sort by days_left ascending (expired first, then soonest expiry)
          # None/error entries go to the end
          def sort_key(f):
              d = f.get('days_left')
              return d if d is not None else 9999

          all_findings.sort(key=sort_key)

          # Split into buckets
          expired      = [f for f in all_findings if f.get('days_left') is not None and f['days_left'] < 0]
          critical     = [f for f in all_findings if f.get('days_left') is not None and 0 <= f['days_left'] <= 7]
          warning_list = [f for f in all_findings if f.get('days_left') is not None and 7  < f['days_left'] <= warning_days]
          ok_list      = [f for f in all_findings if f.get('days_left') is not None and f['days_left'] > warning_days]
          errors       = [f for f in all_findings if f.get('days_left') is None]

          expiring_count = len(expired) + len(critical) + len(warning_list)
          critical_count = len(expired) + len(critical)

          # Set step outputs
          output_file = os.environ.get('GITHUB_OUTPUT', '')
          if output_file:
              with open(output_file, 'a') as f:
                  f.write(f'expiring_count={expiring_count}\n')
                  f.write(f'critical_count={critical_count}\n')

          # ── Emit annotations ───────────────────────────────────────────────
          for f in expired:
              print(f'::error::[{f["context"]}] {f["type"]} "{f["name"]}" on {f["resource"]} '
                    f'EXPIRED {abs(f["days_left"])} day(s) ago ({f["expiry"]})')
          for f in critical:
              print(f'::error::[{f["context"]}] {f["type"]} "{f["name"]}" on {f["resource"]} '
                    f'expires in {f["days_left"]} day(s) — CRITICAL ({f["expiry"]})')
          for f in warning_list:
              print(f'::warning::[{f["context"]}] {f["type"]} "{f["name"]}" on {f["resource"]} '
                    f'expires in {f["days_left"]} day(s) ({f["expiry"]})')

          # ── Build step summary ─────────────────────────────────────────────
          def badge(days):
              if days is None:    return '⚠️ Error'
              if days < 0:        return '💀 Expired'
              if days <= 7:       return '🔴 Critical'
              if days <= warning_days: return '🟡 Warning'
              return '🟢 OK'

          def row(f):
              d = f.get('days_left')
              days_str = f'{d}d' if d is not None else 'N/A'
              return (f'| {badge(d)} | {f["context"]} | {f["type"]} | {f["resource"]} | '
                      f'{f["name"]} | {f.get("expiry", "N/A")} | {days_str} |')

          run_ts  = now.strftime('%Y-%m-%d %H:%M UTC')
          icon    = '🔴' if critical_count > 0 else ('🟡' if expiring_count > 0 else '✅')
          headline = (f'{icon} **{critical_count} critical / {expiring_count} expiring** '
                      f'within {warning_days} days — scanned {now.strftime("%Y-%m-%d %H:%M UTC")}')

          summary_lines = [
              f'## {icon} Credential Health Check\n',
              headline + '\n',
              f'| | Context | Type | Resource | Name | Expiry Date | Days Left |',
              f'|---|---|---|---|---|---|---|',
          ]

          # Display expired + critical + warning first (sorted by days_left), then OK
          display_findings = expired + critical + warning_list + ok_list + errors
          for f in display_findings:
              summary_lines.append(row(f))

          if not display_findings:
              summary_lines.append('| ✅ | — | — | — | No dated credentials found | — | — |')

          summary_lines.append('')
          summary_lines.append(f'> **Threshold:** {warning_days} days  |  **Scanned:** {run_ts}')

          summary_text = '\n'.join(summary_lines)

          step_summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if step_summary:
              with open(step_summary, 'w') as f:
                  f.write(summary_text)

          # Save findings summary for the issue-update step
          with open('health-summary.md', 'w') as f:
              f.write(summary_text)

          with open('health-counts.json', 'w') as f:
              json.dump({
                  'expiring_count': expiring_count,
                  'critical_count': critical_count,
                  'warning_days':   warning_days
              }, f)

          print(f'\n📊 Results: {len(expired)} expired | {len(critical)} critical | '
                f'{len(warning_list)} warning | {len(ok_list)} OK | {len(errors)} errors')

          if critical_count > 0:
              print(f'\n::error::Credential health check: {critical_count} critical/expired credential(s) detected')
              sys.exit(1)

      # ── Alert via webhook when critical credentials are detected ─────────
      # Fires when critical_count > 0 AND the HEALTH_CHECK_WEBHOOK repo variable is set.
      # The webhook receives a JSON POST with a text summary — compatible with Slack
      # Incoming Webhooks, Teams connectors, and PagerDuty Events API v2.
      #
      # To enable: set HEALTH_CHECK_WEBHOOK in GHA-CICD-Core repo variables:
      #   Settings → Secrets and variables → Variables → HEALTH_CHECK_WEBHOOK
      #   Value example (Slack): https://hooks.slack.com/services/T.../B.../...
      - name: Send critical alert via webhook
        if: steps.analyse.outputs.critical_count > 0 && vars.HEALTH_CHECK_WEBHOOK != ''
        shell: python3 {0}
        env:
          WEBHOOK_URL:    ${{ vars.HEALTH_CHECK_WEBHOOK }}
          CRITICAL_COUNT: ${{ steps.analyse.outputs.critical_count }}
          EXPIRING_COUNT: ${{ steps.analyse.outputs.expiring_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          import json, os, urllib.request, urllib.error

          webhook_url    = os.environ['WEBHOOK_URL']
          critical_count = os.environ.get('CRITICAL_COUNT', '0')
          expiring_count = os.environ.get('EXPIRING_COUNT', '0')
          run_url        = os.environ.get('RUN_URL', '')

          # Slack-compatible payload (also works for Teams and generic webhooks)
          payload = {
              'text': (
                  f':rotating_light: *Credential Health Alert* — '
                  f'{critical_count} critical / {expiring_count} expiring\n'
                  f'> Credentials in Azure Key Vault or App Registrations require immediate attention.\n'
                  f'> <{run_url}|View full report>'
              )
          }

          data = json.dumps(payload).encode('utf-8')
          req  = urllib.request.Request(
              webhook_url,
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f'✅ Alert sent to webhook (HTTP {resp.status}): {critical_count} critical credential(s)')
          except urllib.error.HTTPError as e:
              print(f'::warning::Webhook notification failed (HTTP {e.code}): {e.reason}')
          except Exception as e:
              print(f'::warning::Webhook notification failed: {e}')

      # ── Create / update / close GitHub Issue ──────────────────────────────
      - name: Update GitHub Issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let summary, counts;
            try {
              summary = fs.readFileSync('health-summary.md', 'utf8');
              counts  = JSON.parse(fs.readFileSync('health-counts.json', 'utf8'));
            } catch (e) {
              console.log('Summary files not found — scan may have failed early:', e.message);
              return;
            }

            const { expiring_count, critical_count, warning_days } = counts;
            const LABEL = 'credential-expiry';
            const TITLE = '🔑 Credential Expiry Alert';

            // ── Ensure label exists ────────────────────────────────────────
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  LABEL,
                color: 'e11d48',
                description: 'Credentials or secrets approaching expiry'
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists, OK
            }

            // ── Find existing open issue ───────────────────────────────────
            const { data: issues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: LABEL,
              state:  'open'
            });

            const existingIssue = issues[0];

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body   = `${summary}\n\n---\n_Last updated by [workflow run](${runUrl}) · ${new Date().toUTCString()}_`;

            if (expiring_count > 0 || critical_count > 0) {
              if (existingIssue) {
                // Update existing issue
                await github.rest.issues.update({
                  owner:    context.repo.owner,
                  repo:     context.repo.repo,
                  issue_number: existingIssue.number,
                  title:    TITLE,
                  body:     body
                });
                console.log(`✅ Updated issue #${existingIssue.number}`);
              } else {
                // Create new issue
                const { data: newIssue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  TITLE,
                  body:   body,
                  labels: [LABEL]
                });
                console.log(`✅ Created issue #${newIssue.number}`);
              }
            } else {
              // Nothing expiring — close any existing issue
              if (existingIssue) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: existingIssue.number,
                  body:         `✅ All credentials are healthy (no expiry within ${warning_days} days).\n\n_Auto-closed by [workflow run](${runUrl}) · ${new Date().toUTCString()}_`
                });
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: existingIssue.number,
                  state:        'closed'
                });
                console.log(`✅ Closed issue #${existingIssue.number} — all credentials healthy`);
              } else {
                console.log('✅ All credentials healthy — no issue to update');
              }
            }
