# ─────────────────────────────────────────────────────────────────────────────
# _stage-deploy-chain.yml  —  Reusable DEPLOY CHAIN stage
#
# Drives PARALLEL promotion — all environments start simultaneously.
# Each job has its own  environment: <name>  so GitHub renders a distinct
# "Waiting for review" gate per environment.  Approvals can be granted in any
# order or all at once.  Deployments run as soon as their gate is approved.
#
# WHY EXPLICIT JOBS (not strategy.matrix):
#   strategy.matrix collapses all environments into a single job node in the
#   GitHub Actions UI — individual approval gates are invisible.
#   Each named job here carries  environment: <name>  so GitHub renders a
#   distinct "Waiting for review" gate node per environment when Required
#   Reviewers are configured in Settings → Environments → <name>.
#
# GATE SETUP (one-time, per repo):
#   Settings → Environments → <name> → Required reviewers → add reviewer(s)
#   Once configured, GitHub pauses each job and shows an approval prompt
#   before the runner starts. No extra gate jobs needed.
#
# PARALLELISM:
#   No inter-environment needs: — all gates open simultaneously.
#   Approve all at once or selectively; each environment deploys independently.
#   Different Dataverse tenants can receive imports concurrently.
#   (max-parallel:1 still applies WITHIN each environment for multi-solution runs.)
#
# ENVIRONMENT FILTER:
#   Pass  environments: 'Dev,Intg'  to deploy only those two in parallel.
#   Empty string (default) deploys all 6.
#   Examples:
#     'Dev,Intg,UAT,FRS,Perf'  → Pipeline 1 (pre-prod, parallel)
#     'UAT,Prod'                → Pipeline 2 (UAT re-validation → Prod sequential)
#
# INPUT STRUCTURE — two layers:
#   Common inputs:  matrix, mock_deploy, base_solutions,
#                   jfrog_url, jfrog_repo, run_number, run_attempt
#   Per-env inputs: dev_config, intg_config, uat_config, frs_config,
#                   perf_config, prod_config  (compact JSON objects)
#
#   Each *_config carries:
#     name                  — must match a GitHub Environment in repo Settings
#     url                   — Power Platform environment URL
#     previous_url          — URL of the prior environment (version-compare)
#     solution_type         — "Unmanaged" (Dev) or "Managed" (others)
#     enable_backup         — export current solution as backup before import
#     enable_blocking_check — block on active flows / ownership locks
#     enable_version_compare— skip import when installed version >= artifact version
#     import_config_data    — run pac data import after solution import
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      # ── Solution matrix (from setup job) ──────────────────────────────────
      matrix:
        description: 'JSON array of solution objects from the setup job'
        required: true
        type: string

      # ── Environment filter ────────────────────────────────────────────────
      # Comma-separated list of environment names to include in this run.
      # Empty (default) = deploy all 6 in sequence.
      environments:
        description: 'Comma-separated environment names to deploy (empty = all 6)'
        required: false
        type: string
        default: ''

      # ── Cross-run artifact source ─────────────────────────────────────────
      # Phase 2 passes the Phase 1 run_id so artifacts can be downloaded
      # from that run. Empty (default) = download from the current run.
      source_run_id:
        description: 'GitHub run ID to download solution artifacts from (empty = current run)'
        required: false
        type: string
        default: ''

      # ── Common options ────────────────────────────────────────────────────
      mock_deploy:
        description: 'Simulate all deployments without touching Power Platform'
        required: false
        type: boolean
        default: false
      base_solutions:
        description: 'Comma-separated base solution names to verify are installed'
        required: false
        type: string
        default: ''
      jfrog_url:
        description: 'JFrog Artifactory base URL (used only for Prod prodDeployed tagging)'
        required: false
        type: string
        default: ''
      jfrog_repo:
        description: 'JFrog repository name'
        required: false
        type: string
        default: 'power-platform'
      run_number:
        description: 'GitHub run number (for deterministic artifact naming)'
        required: true
        type: string
      run_attempt:
        description: 'GitHub run attempt'
        required: true
        type: string

      solution_list:
        description: 'Comma-separated solution names — included in ServiceNow CR description'
        required: false
        type: string
        default: ''
      enable_servicenow:
        description: 'Enable ServiceNow change management for all deployments in this chain'
        required: false
        type: boolean
        default: false
      activate_flows:
        description: 'Activate Cloud Flows after each solution import'
        required: false
        type: boolean
        default: true

      azure_client_id:
        description: 'Azure service principal client ID — from project-vars.yml AZURE_CLIENT_ID'
        required: false
        type: string
        default: ''
      azure_tenant_id:
        description: 'Azure tenant ID — from project-vars.yml AZURE_TENANT_ID'
        required: false
        type: string
        default: ''
      azure_subscription_id:
        description: 'Azure subscription ID — from project-vars.yml AZURE_SUBSCRIPTION_ID'
        required: false
        type: string
        default: ''
      # azure_key_vault_name is NOT a top-level input — it is read per-environment
      # from the key_vault_name field in each *_config JSON input below.
      # ── Per-environment config inputs ─────────────────────────────────────
      # Each is a compact JSON object — see header comment for field reference.
      dev_config:
        description: 'JSON config object for the Dev environment (omit when environments filter excludes Dev)'
        required: false
        type: string
        default: '{}'
      intg_config:
        description: 'JSON config object for the Intg environment (omit when environments filter excludes Intg)'
        required: false
        type: string
        default: '{}'
      uat_config:
        description: 'JSON config object for the UAT environment (omit when environments filter excludes UAT)'
        required: false
        type: string
        default: '{}'
      frs_config:
        description: 'JSON config object for the FRS environment (omit when environments filter excludes FRS)'
        required: false
        type: string
        default: '{}'
      perf_config:
        description: 'JSON config object for the Perf environment (omit when environments filter excludes Perf)'
        required: false
        type: string
        default: '{}'
      prod_config:
        description: 'JSON config object for the Prod environment (omit when environments filter excludes Prod)'
        required: false
        type: string
        default: '{}'

      # ── PR creation (Pipeline 1 only) ─────────────────────────────────────
      # When feature_branch is set, a create-pr job runs after deploy-uat
      # succeeds. FRS and Perf continue in parallel and do NOT block the PR.
      feature_branch:
        description: 'Feature branch to open PR from (empty = skip PR creation)'
        required: false
        type: string
        default: ''
      pr_base_branch:
        description: 'Base branch for the PR (default: main)'
        required: false
        type: string
        default: 'main'
      pr_repository:
        description: 'Repository for the PR (default: caller repo)'
        required: false
        type: string
        default: ''
      pr_run_id:
        description: 'GitHub run ID — used in PR body link'
        required: false
        type: string
        default: ''
      pr_run_number:
        description: 'GitHub run number — used in PR title'
        required: false
        type: string
        default: ''
      pr_actor:
        description: 'GitHub actor who triggered the run — used in PR body'
        required: false
        type: string
        default: ''
      pr_mock_deploy:
        description: 'Prefix PR title with [MOCK] when true'
        required: false
        type: boolean
        default: false
      pr_server_url:
        description: 'GitHub server URL — used in PR body link'
        required: false
        type: string
        default: 'https://github.com'

    outputs:
      uat_result:
        description: 'Result of the deploy-uat job (success|failure|skipped|cancelled)'
        value: ${{ jobs.deploy-uat.result }}

# ═════════════════════════════════════════════════════════════════════════════
# Dev
# ═════════════════════════════════════════════════════════════════════════════
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-dev:
    name: "🚀 Deploy | Dev"
    runs-on: ubuntu-latest
    timeout-minutes: 120  # hard stop prevents SN/PP hangs from blocking runners indefinitely
    environment: Dev
    # No needs: — first in the chain
    if: inputs.environments == '' || contains(inputs.environments, 'Dev')
    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      - name: Reveille
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/reveille@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          ${{ inputs.jfrog_url != '' }}
          azure_client_id:        ${{ inputs.azure_client_id }}
          azure_tenant_id:        ${{ inputs.azure_tenant_id }}
          azure_subscription_id:  ${{ inputs.azure_subscription_id }}
          azure_key_vault_name:   ${{ fromJson(inputs.dev_config).key_vault_name }}

      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/pac-install@main

      - name: Download solution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: solution-artifact-*
          path: .
          merge-multiple: true
          run-id: ${{ inputs.source_run_id != '' && inputs.source_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy all solutions → Dev
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/deploy-all-solutions@main
        with:
          solutions_json:           ${{ inputs.matrix }}
          environment_name:         ${{ fromJson(inputs.dev_config).name }}
          environment_url:          ${{ fromJson(inputs.dev_config).url }}
          solution_type:            ${{ fromJson(inputs.dev_config).solution_type }}
          enable_backup:            ${{ fromJson(inputs.dev_config).enable_backup }}
          enable_blocking_check:    ${{ fromJson(inputs.dev_config).enable_blocking_check }}
          enable_version_compare:   ${{ fromJson(inputs.dev_config).enable_version_compare }}
          import_config_data:       ${{ fromJson(inputs.dev_config).import_config_data }}
          previous_environment_url: ${{ fromJson(inputs.dev_config).previous_url }}
          tag_prod_deployed:        false
          mock_deploy:              ${{ inputs.mock_deploy }}
          base_solutions:           ${{ inputs.base_solutions }}
          jfrog_url:                ${{ inputs.jfrog_url }}
          jfrog_repo:               ${{ inputs.jfrog_repo }}
          run_number:               ${{ inputs.run_number }}
          run_attempt:              ${{ inputs.run_attempt }}
          enable_servicenow:        ${{ inputs.enable_servicenow }}
          solution_list:            ${{ inputs.solution_list }}
          activate_flows:           ${{ inputs.activate_flows }}

