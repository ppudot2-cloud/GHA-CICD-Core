# ─────────────────────────────────────────────────────────────────────────────
# Prod is NOT in this chain.
# Production is deployed by deploy-prod.yml (Pipeline 2), which has its own
# inline deploy-uat (re-validation) and deploy-prod jobs and is triggered
# separately on merge to main. Keeping Prod out of this chain ensures it
# never appears — even as skipped — in Pipeline 1 run graphs.
# ─────────────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════════════
# create-pr  —  Opens the feature → main PR as soon as UAT passes.
#
# Runs only when feature_branch input is supplied (Pipeline 1 sets it;
# Pipeline 2 and ad-hoc callers leave it empty → job is skipped).
# FRS and Perf continue in parallel and do NOT block this job.
# ═════════════════════════════════════════════════════════════════════════════
  create-pr:
    name: "🔀 Open PR → ${{ inputs.pr_base_branch || 'main' }}"
    needs: [deploy-uat]
    if: |
      inputs.feature_branch != '' &&
      needs.deploy-uat.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      # ── Checkout the caller repo (GHA-Dynamics) at the feature branch ─────────
      # Full history (fetch-depth: 0) is required so git log can reach the
      # last merge commit on origin/main used as the changelog baseline.
      - name: Checkout caller repo at feature branch
        uses: actions/checkout@v4
        with:
          repository:  ${{ inputs.pr_repository }}
          ref:         ${{ inputs.feature_branch }}
          token:       ${{ secrets.GHA_CORE_PAT }}
          fetch-depth: 0
          path:        .

      # ── Checkout GHA-CICD-Core so we can call Write-Changelog.ps1 ──────────────────
      - name: Checkout GHA-CICD-Core (changelog script)
        uses: actions/checkout@v4
        with:
          repository: ppudot2-cloud/GHA-CICD-Core
          ref:        main
          token:      ${{ secrets.GHA_CORE_PAT }}
          path:       .ci

      # ── Generate the changelog and build the complete PR body file ────────────
      # Write-Changelog.ps1 groups commits by solution folder (solutions.json)
      # and writes changelog.md.  This step then combines the gate-status header
      # with the changelog into pr-body.md for  gh pr create --body-file.
      - name: Generate changelog and build PR body
        shell: pwsh
        # Pass GHA expressions as env vars — never inline in run: strings.
        # Env-var assignment is injection-safe: values are treated as data,
        # not parsed as code, even if they contain quotes or shell metacharacters.
        env:
          PR_RUN_NUMBER:  ${{ inputs.run_number }}
          PR_RUN_ID:      ${{ inputs.pr_run_id }}
          PR_ACTOR:       ${{ inputs.pr_actor }}
          PR_FEATURE:     ${{ inputs.feature_branch }}
          PR_REPOSITORY:  ${{ inputs.pr_repository }}
          PR_SERVER_URL:  ${{ inputs.pr_server_url }}
          PR_SOLUTIONS:   ${{ inputs.solution_list }}
          PR_MOCK_DEPLOY: ${{ inputs.mock_deploy }}
        run: |
          # Make origin/main reachable for baseline detection.
          # On failure (network error, expired token), emit a warning and continue —
          # Write-Changelog.ps1 falls back to the initial commit as the baseline.
          git fetch origin main --quiet 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Could not fetch origin/main — changelog will use full history as fallback"
          }

          & .ci/.github/scripts/dynamics/Write-Changelog.ps1 `
            -SolutionsJsonPath 'solutions.json' `
            -RunNumber         $env:PR_RUN_NUMBER `
            -FeatureBranch     $env:PR_FEATURE `
            -OutputPath        'changelog.md'

          # Combine static PR header + generated changelog into one body file.
          # Using [char]0x60 for backtick avoids PowerShell escape ambiguity.
          $bt         = [char]0x60
          $runNumber  = $env:PR_RUN_NUMBER
          $runId      = $env:PR_RUN_ID
          $actor      = $env:PR_ACTOR
          $feature    = $env:PR_FEATURE
          $repo       = $env:PR_REPOSITORY
          $server     = $env:PR_SERVER_URL
          $solutions  = $env:PR_SOLUTIONS
          $mockDeploy = $env:PR_MOCK_DEPLOY

          $changelog = if (Test-Path 'changelog.md') {
            Get-Content 'changelog.md' -Raw -Encoding utf8
          } else {
            '_Changelog unavailable — see pipeline run for details._'
          }

          $sb = [System.Text.StringBuilder]::new()
          [void]$sb.AppendLine("## ✅ UAT passed — ready for Prod")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("**Pipeline run:** [#$runNumber]($server/$repo/actions/runs/$runId)")
          [void]$sb.AppendLine("**Branch:** $bt$feature$bt")
          [void]$sb.AppendLine("**Solutions:** $solutions")
          [void]$sb.AppendLine("**Triggered by:** @$actor")
          [void]$sb.AppendLine("**Mock deploy:** $mockDeploy")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("### Gate status at PR creation")
          [void]$sb.AppendLine("- [x] Solution Checker: passed")
          [void]$sb.AppendLine("- [x] Dev: success")
          [void]$sb.AppendLine("- [x] Intg: success")
          [void]$sb.AppendLine("- [x] UAT: success ✅")
          [void]$sb.AppendLine("- [ ] FRS: running in parallel (not required for this PR)")
          [void]$sb.AppendLine("- [ ] Perf: running in parallel (not required for this PR)")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("Merging this PR triggers **deploy-prod.yml** (UAT re-validation → Prod).")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("---")
          [void]$sb.AppendLine("")
          [void]$sb.Append($changelog)

          $sb.ToString() | Out-File -FilePath 'pr-body.md' -Encoding utf8 -NoNewline
          Write-Host "✅ PR body written to pr-body.md ($($sb.Length) chars)"

      # ── Open the pull request using the generated body file ───────────────────
      - name: Create PR feature → ${{ inputs.pr_base_branch || 'main' }}
        env:
          GH_TOKEN: ${{ secrets.GHA_CORE_PAT }}
        shell: bash
        run: |
          FEATURE="${{ inputs.feature_branch }}"
          REPO="${{ inputs.pr_repository }}"
          BASE="${{ inputs.pr_base_branch || 'main' }}"
          RUN_NUMBER="${{ inputs.run_number }}"
          MOCK_LABEL="${{ inputs.pr_mock_deploy == true && '[MOCK] ' || '' }}"

          PR_URL=$(gh pr create \
            --repo      "$REPO" \
            --head      "$FEATURE" \
            --base      "$BASE" \
            --title     "${MOCK_LABEL}Release: pipeline run #${RUN_NUMBER}" \
            --body-file pr-body.md \
          )
          echo "✅ PR created: $PR_URL"
