# ─────────────────────────────────────────────────────────────────────────────
# _stage-export.yml  —  Reusable EXPORT STAGE
#
# TWO MODES — controlled by the skip_export input:
#
# skip_export=false (default — sandbox export mode):
#   Fans out per solution (parallel) and for each solution:
#   1. reveille         – checkout, Azure OIDC login, AKV secrets, merge vars
#   2. pac-install      – install PAC CLI
#   3. export-solution  – export unmanaged ZIP from sandbox, unpack to source tree
#   4. upload-artifact  – upload unpacked source as exported-source-<name> artifact
#   Then the commit job:
#   5. commit – create feature/pipeline-{run_number} from origin/main, copy
#               exported source, write pipeline-context.json, push to origin.
#
# NOTE: Lint and runtime config validation are intentionally NOT in this stage.
#   They run as the first job in _stage-build.yml (before any build work begins),
#   so all checks are consolidated into one "Lint + Validate Pipeline Config" gate.
#
# skip_export=true (manual export mode):
#   The per-solution export jobs are SKIPPED. The user has already exported,
#   unpacked, and committed the solution source to a feature/* branch.
#   The commit job still runs to write pipeline-context.json onto that branch
#   so Pipeline 2 can locate the build artifacts later.
#   No branch creation, no source copy — just pipeline-context.json on top.
#
# Git operations are always real — mock_deploy only suppresses PP imports.
#
# Outputs:
#   feature_branch – branch name that was created (normal) or used (skip_export)
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON array of solution objects from the setup job'
        required: true
        type: string
      source_environment_url:
        description: 'Power Platform sandbox URL to export solutions from'
        required: true
        type: string
      mock_deploy:
        description: 'Simulate export (no real PP connection) — git operations still run'
        required: false
        type: boolean
        default: false
      solution_list:
        description: 'Comma-separated solution names — used by the commit job to copy source trees'
        required: true
        type: string
      skip_export:
        description: >
          Skip sandbox export — use source already committed to the current branch.
          Set automatically when triggered by a push event. The export matrix jobs
          are skipped; the commit job still runs to write pipeline-context.json.
        required: false
        type: boolean
        default: false

      azure_client_id:
        description: 'Azure service principal client ID — passed from the caller repo (vars.AZURE_CLIENT_ID)'
        required: false
        type: string
        default: ''
      azure_tenant_id:
        description: 'Azure tenant ID — passed from the caller repo (vars.AZURE_TENANT_ID)'
        required: false
        type: string
        default: ''
      azure_subscription_id:
        description: 'Azure subscription ID — passed from the caller repo (vars.AZURE_SUBSCRIPTION_ID)'
        required: false
        type: string
        default: ''
      azure_key_vault_name:
        description: 'Azure Key Vault name — passed from the caller repo (vars.AZURE_KEY_VAULT_NAME)'
        required: false
        type: string
        default: ''
    outputs:
      feature_branch:
        description: 'Feature branch created and pushed by the commit job'
        value: ${{ jobs.commit.outputs.feature_branch }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: "📤 Export | ${{ matrix.solution.name }}"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_export }}
    strategy:
      matrix: ${{ fromJson(inputs.matrix) }}
      fail-fast: false   # export failures are isolated per solution

    env:
      GHA_CORE_PAT: ${{ secrets.GHATOKEN }}

    steps:
      # ── 1. Bootstrap ──────────────────────────────────────────────────────────
      - name: Reveille
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/reveille@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          false
          azure_client_id:        ${{ inputs.azure_client_id }}
          azure_tenant_id:        ${{ inputs.azure_tenant_id }}
          azure_subscription_id:  ${{ inputs.azure_subscription_id }}
          azure_key_vault_name:   ${{ inputs.azure_key_vault_name }}

      # ── 2. Install PAC CLI ────────────────────────────────────────────────────
      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/pac-install@main

      # ── 3. Export solution from sandbox ───────────────────────────────────────
      - name: Export Solution
        id: export
        uses: ppudot2-cloud/GHA-CICD-Core/.github/actions/dynamics/export-solution@main
        with:
          solution_name:          ${{ matrix.solution.name }}
          source_environment_url: ${{ inputs.source_environment_url }}
          export_folder:          export-src
          mock_deploy:            ${{ inputs.mock_deploy }}

      # ── 4. Upload unpacked source as artifact for build stage ─────────────────
      - name: Upload exported source
        uses: actions/upload-artifact@v4
        with:
          name: exported-source-${{ matrix.solution.name }}
          # Upload the unpacked source tree so build stage can pack+version-stamp it
          path: ${{ steps.export.outputs.source_folder }}/${{ matrix.solution.name }}/
          retention-days: 1   # short-lived — only needed within the same pipeline run
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # commit  —  runs after BOTH lint and export finish (or export is skipped).
  #
  # Lint and export run in parallel. Commit waits for both.
  #
  # skip_export=false (normal sandbox export):
  #   Creates feature/pipeline-{run_number} from origin/main, copies the
  #   exported source trees from artifacts, writes pipeline-context.json, pushes.
  #
  # skip_export=true (manual export / push-triggered):
  #   The per-solution export jobs above were skipped. We are already on the
  #   correct feature/* branch (the user committed there). This job only writes
  #   pipeline-context.json on top of that branch so Pipeline 2 can find the
  #   build artifacts. No branch creation, no source copying.
  #
  # Always real git — mock_deploy only suppresses Power Platform imports.
  # ─────────────────────────────────────────────────────────────────────────────
  commit:
    name: "📤 Commit pipeline context"
    needs: [export]
    # Run when export succeeded or was skipped (skip_export=true).
    # Lint + runtime config validation now runs in the Build stage before any build work begins.
    if: needs.export.result == 'success' || needs.export.result == 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions:  read      # needed by download-artifact@v4 in same run

    outputs:
      feature_branch: ${{ steps.push.outputs.feature_branch }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Only download export artifacts in normal (non-skip) mode.
      # In skip_export mode there are no exported-source-* artifacts.
      - name: Download all exported source artifacts
        if: ${{ inputs.skip_export != true }}
        uses: actions/download-artifact@v4
        with:
          pattern: exported-source-*
          path: _export-src/
          merge-multiple: false

      - name: Commit source + write pipeline-context.json + push
        id: push
        shell: pwsh
        run: |
          $skipExport = '${{ inputs.skip_export }}' -eq 'true'
          $isMock     = '${{ inputs.mock_deploy }}' -eq 'true'
          $runNumber  = '${{ github.run_number }}'
          $runAttempt = '${{ github.run_attempt }}'
          $runId      = '${{ github.run_id }}'

          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"

          if ($skipExport) {
            # ── Manual / push-triggered mode ──────────────────────────────────
            # Source is already committed to this branch by the user.
            # Stay on the current branch — just write pipeline-context.json.
            $branch = '${{ github.ref_name }}'
            git fetch origin
            Write-Host "  ✓ Skip-export mode — using existing branch: $branch"
            Write-Host "    Source committed by: ${{ github.actor }}"
          } else {
            # ── Normal sandbox-export mode ────────────────────────────────────
            # Create a fresh feature branch from main, copy exported sources.
            $branch = "feature/pipeline-$runNumber"
            git fetch origin main
            git checkout -b $branch origin/main
            Write-Host "  ✓ Created branch $branch from origin/main"

            $solutions = '${{ inputs.solution_list }}' -split ',' |
              ForEach-Object { $_.Trim() } | Where-Object { $_ }

            foreach ($sol in $solutions) {
              $srcDir = "_export-src/exported-source-$sol"
              $dstDir = "src/solutions/$sol"
              if (Test-Path $srcDir) {
                if (Test-Path $dstDir) { Remove-Item $dstDir -Recurse -Force }
                Copy-Item $srcDir $dstDir -Recurse -Force
                Write-Host "  ✓ Copied $sol → src/solutions/$sol/"
              } else {
                Write-Warning "  ⚠ Exported source not found for $sol at $srcDir — using existing tree"
              }
            }

            # Write a per-run export marker inside every solution folder.
            # Guarantees the feature branch always has at least one commit ahead of
            # main — even in mock mode where source is unchanged — so gh pr create
            # never fails with "nothing to merge".
            foreach ($sol in $solutions) {
              $markerDir = "src/solutions/$sol"
              if (Test-Path $markerDir) {
                $exportMode = if ($isMock) { 'mock (source unchanged, simulated export)' } else { 'real (exported from sandbox)' }
                $marker = [ordered]@{
                  pipelineRunId      = $runId
                  pipelineRunNumber  = [int]$runNumber
                  pipelineRunAttempt = [int]$runAttempt
                  exportMode         = $exportMode
                  exportedAt         = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
                  exportedBy         = '${{ github.actor }}'
                  sandboxUrl         = '${{ inputs.source_environment_url }}'
                }
                $marker | ConvertTo-Json | Set-Content "$markerDir/.pipeline-export.json" -Encoding UTF8
                Write-Host "  ✓ Written export marker → $markerDir/.pipeline-export.json"
              }
            }

            if (Test-Path '_export-src') { Remove-Item '_export-src' -Recurse -Force }
          }

          # ── Both modes: write pipeline-context.json ───────────────────────
          # Pipeline 2 reads this file from main to locate the Phase 1 run_id
          # and download the built solution artifacts.
          $solutions = '${{ inputs.solution_list }}' -split ',' |
            ForEach-Object { $_.Trim() } | Where-Object { $_ }

          $exportMode = if ($skipExport) { 'manual (user-committed source)' } `
                        elseif ($isMock) { 'mock (simulated sandbox export)' } `
                        else             { 'real (exported from sandbox)' }

          $ctx = [ordered]@{
            runId         = $runId
            runNumber     = $runNumber
            runAttempt    = $runAttempt
            solutions     = $solutions
            solutionList  = '${{ inputs.solution_list }}'
            matrix        = '${{ inputs.matrix }}'
            featureBranch = $branch
            triggeredBy   = '${{ github.actor }}'
            triggeredAt   = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
            exportMode    = $exportMode
            mockDeploy    = $isMock
          }
          $ctx | ConvertTo-Json -Depth 3 | Set-Content 'pipeline-context.json' -Encoding UTF8
          Write-Host "  ✓ Written pipeline-context.json (runId=$runId, branch=$branch, mode=$exportMode)"

          # Stage the right set of files depending on mode
          if ($skipExport) {
            git add pipeline-context.json
          } else {
            git add src/solutions/ pipeline-context.json
          }

          $status = git status --porcelain
          if ($status) {
            $mockTag  = if ($isMock)     { ' [mock]' }   else { '' }
            $modeTag  = if ($skipExport) { 'manual export' } else { 'sandbox export' }
            $commitMsg = "chore: $modeTag — pipeline run #$runNumber$mockTag [skip ci]"
            git commit -m $commitMsg
            Write-Host "  ✓ Committed: $commitMsg"
          } else {
            Write-Host "  ℹ No changes to commit"
          }

          # Push with retry — GitHub occasionally returns "fatal error in commit_refs"
          # (a transient server-side error) even when the push succeeded.  We retry
          # once, then verify the remote branch matches HEAD before failing.
          $pushCmd = if ($skipExport) {
            { git push origin HEAD --force-with-lease 2>&1 }
          } else {
            { git push origin $branch 2>&1 }
          }

          $pushOut = & $pushCmd
          if ($LASTEXITCODE -ne 0) {
            Write-Host "  ⚠️  First push attempt exited $LASTEXITCODE — output: $pushOut"
            Write-Host "  ↩️  Retrying push in 5 s..."
            Start-Sleep -Seconds 5
            $pushOut = & $pushCmd
            if ($LASTEXITCODE -ne 0) {
              # Retry also failed — verify whether the branch actually landed
              Write-Host "  ⚠️  Retry exited $LASTEXITCODE — verifying remote state..."
              git fetch origin $branch 2>&1 | Out-Null
              $remoteRef = git rev-parse "origin/$branch" 2>&1
              $localRef  = git rev-parse HEAD
              if ($remoteRef -eq $localRef) {
                Write-Host "  ✅  Remote branch matches local HEAD ($($localRef.Substring(0,8))) — push succeeded despite error response"
              } else {
                Write-Error "::error::Push failed and remote branch does not match HEAD. Remote: $remoteRef  Local: $localRef"
                exit 1
              }
            }
          }
          Write-Host "  ✓ Pushed branch $branch to origin"

          "feature_branch=$branch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
